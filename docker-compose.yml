services:
  gateway-go-control-plane:
    build:
      context: ./services/gateway-go
      dockerfile: Dockerfile
    container_name: gateway-go-control-plane
    expose:
      - "7000"
    environment:
      - GATEWAY_GO_LISTEN=:7000
      - GATEWAY_GO_STORE_PATH=/app/data/gateway_go_store.json
      - GATEWAY_REQUIRE_AUTH=true
      - APP_AUTH_SECRET=${JWT_SECRET_KEY:-your-jwt-secret-key}
      - APP_BACKEND_URL=http://agent-framework:5001
      - AI_BACKEND_URL=http://agent-framework:5001
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7000/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - agent-network

  go-gateway:
    build:
      context: ./go_services/gateway
      dockerfile: Dockerfile
    container_name: go-gateway
    ports:
      - "5000:5000"
    environment:
      - GATEWAY_LISTEN=:5000
      - PYTHON_BACKEND_URL=http://agent-framework:5001
      - GATEWAY_CONTROL_PLANE_URL=http://gateway-go-control-plane:7000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - STATIC_DIR=/app/static
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
    volumes:
      - ./src/agent_framework/static:/app/static:ro
    depends_on:
      agent-framework:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - agent-network

  agent-framework:
    build: .
    container_name: agent-framework
    expose:
      - "5001"
    depends_on:
      gateway-go-control-plane:
        condition: service_healthy
    environment:
      - INTERNAL_PORT=5001
      - GATEWAY_CONTROL_PLANE=go
      - GATEWAY_CONTROL_PLANE_URL=http://gateway-go-control-plane:7000
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-Qwen/Qwen3-VL-32B-Instruct}
      - BASE_URL=${BASE_URL:-https://api.siliconflow.cn/v1}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os,urllib.request; port=os.environ.get('INTERNAL_PORT','5000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=3).read()"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - agent-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: agent-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    networks:
      - agent-network

  redis:
    image: redis:7-alpine
    container_name: agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - agent-network

  postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=agent_framework
      - POSTGRES_USER=agent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - agent-network

  nginx:
    image: nginx:alpine
    container_name: agent-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      go-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  chroma-data:
  redis-data:
  postgres-data:

networks:
  agent-network:
    driver: bridge
