<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性能监控仪表板</title>
    <link rel="stylesheet" href="/static/css/base-theme.css">
    <style>
        :root {
            --primary: #1363df;
            --primary-deep: #0f4eb3;
            --primary-light: #dbeafe;
            --primary-soft: rgba(19, 99, 223, 0.08);
            --primary-glow: rgba(19, 99, 223, 0.28);
            --line-strong: rgba(19, 99, 223, 0.24);
            --line-glow: rgba(19, 99, 223, 0.42);
            --warning: #06b6d4;
        }
        /* page-specific overrides only — base-theme.css handles resets, body, topbar, btn */

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #999;
            font-size: 12px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .panel {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .panel h2 {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .function-list {
            list-style: none;
        }

        .function-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .function-name {
            font-weight: 600;
            color: #333;
        }

        .function-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #666;
        }

        .suggestion-list {
            list-style: none;
        }

        .suggestion-item {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(19, 99, 223, 0.08);
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            color: var(--primary-deep);
        }

        .slow-query-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            border-radius: 4px;
        }

        .slow-query-name {
            font-weight: 600;
            color: #721c24;
            margin-bottom: 5px;
        }

        .slow-query-time {
            color: #721c24;
            font-size: 14px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background: var(--primary-deep);
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-wide">
        <nav class="topbar">
            <div class="brand">
                <a class="back-link" href="/developer">← 返回</a>
                <h1>性能监控仪表板</h1>
            </div>
            <div class="topbar-actions">
            </div>
        </nav>

        <div id="error-message" class="error" style="display: none;"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>监控函数</h3>
                <div class="value" id="total-functions">-</div>
                <div class="label">个函数正在监控</div>
            </div>

            <div class="stat-card">
                <h3>总调用次数</h3>
                <div class="value" id="total-calls">-</div>
                <div class="label">次API调用</div>
            </div>

            <div class="stat-card">
                <h3>平均响应时间</h3>
                <div class="value" id="avg-time">-</div>
                <div class="label">秒</div>
            </div>

            <div class="stat-card">
                <h3>错误率</h3>
                <div class="value" id="error-rate">-</div>
                <div class="label">%</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <h2>最慢的函数 TOP 5</h2>
                <ul class="function-list" id="slowest-functions">
                    <li class="loading">加载中...</li>
                </ul>
            </div>

            <div class="panel">
                <h2>调用最频繁的函数 TOP 5</h2>
                <ul class="function-list" id="most-called-functions">
                    <li class="loading">加载中...</li>
                </ul>
            </div>
        </div>

        <div class="content-grid">
            <div class="panel">
                <h2>慢查询检测</h2>
                <ul class="function-list" id="slow-queries">
                    <li class="loading">加载中...</li>
                </ul>
            </div>

            <div class="panel">
                <h2>优化建议</h2>
                <ul class="suggestion-list" id="suggestions">
                    <li class="loading">加载中...</li>
                </ul>
            </div>
        </div>

        <div class="panel">
            <h2>操作</h2>
            <div class="actions">
                <button class="btn" onclick="refreshData()">刷新数据</button>
                <button class="btn" onclick="exportMetrics()">导出指标</button>
                <button class="btn btn-danger" onclick="clearMetrics()">清空数据</button>
            </div>
        </div>
    </div>

    <script>
        let autoRefresh = true;

        async function fetchDashboard() {
            try {
                const response = await fetch('/api/performance/dashboard');
                if (!response.ok) throw new Error('获取数据失败');

                const data = await response.json();
                updateDashboard(data);
                hideError();
            } catch (error) {
                showError('无法加载性能数据: ' + error.message);
            }
        }

        function updateDashboard(data) {
            // 更新总体统计
            document.getElementById('total-functions').textContent = data.overview.total_functions;
            document.getElementById('total-calls').textContent = data.overview.total_calls;
            document.getElementById('avg-time').textContent = data.overview.avg_time.toFixed(3);
            document.getElementById('error-rate').textContent = (data.overview.error_rate * 100).toFixed(2);

            // 更新最慢的函数
            const slowestList = document.getElementById('slowest-functions');
            slowestList.innerHTML = '';
            if (data.top_functions.slowest.length === 0) {
                slowestList.innerHTML = '<li class="loading">暂无数据</li>';
            } else {
                data.top_functions.slowest.forEach((func, index) => {
                    const li = document.createElement('li');
                    li.className = 'function-item';
                    li.innerHTML = `
                        <span class="function-name">${index + 1}. ${func.name}</span>
                        <div class="function-stats">
                            <span>平均: ${func.avg_time.toFixed(3)}s</span>
                            <span>调用: ${func.count}次</span>
                        </div>
                    `;
                    slowestList.appendChild(li);
                });
            }

            // 更新调用最频繁的函数
            const mostCalledList = document.getElementById('most-called-functions');
            mostCalledList.innerHTML = '';
            if (data.top_functions.most_called.length === 0) {
                mostCalledList.innerHTML = '<li class="loading">暂无数据</li>';
            } else {
                data.top_functions.most_called.forEach((func, index) => {
                    const li = document.createElement('li');
                    li.className = 'function-item';
                    li.innerHTML = `
                        <span class="function-name">${index + 1}. ${func.name}</span>
                        <div class="function-stats">
                            <span>调用: ${func.count}次</span>
                            <span>平均: ${func.avg_time.toFixed(3)}s</span>
                        </div>
                    `;
                    mostCalledList.appendChild(li);
                });
            }

            // 更新慢查询
            const slowQueriesList = document.getElementById('slow-queries');
            slowQueriesList.innerHTML = '';
            if (data.slow_queries.length === 0) {
                slowQueriesList.innerHTML = '<li class="loading">未发现慢查询</li>';
            } else {
                data.slow_queries.forEach(query => {
                    const li = document.createElement('li');
                    li.className = 'slow-query-item';
                    li.innerHTML = `
                        <div class="slow-query-name">${query.name}</div>
                        <div class="slow-query-time">耗时: ${query.duration.toFixed(3)}s | ${query.timestamp}</div>
                    `;
                    slowQueriesList.appendChild(li);
                });
            }

            // 更新优化建议
            const suggestionsList = document.getElementById('suggestions');
            suggestionsList.innerHTML = '';
            if (data.suggestions.length === 0) {
                suggestionsList.innerHTML = '<li class="loading">系统性能良好，暂无优化建议</li>';
            } else {
                data.suggestions.forEach(suggestion => {
                    const li = document.createElement('li');
                    li.className = 'suggestion-item';
                    li.textContent = suggestion;
                    suggestionsList.appendChild(li);
                });
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        async function refreshData() {
            await fetchDashboard();
        }

        async function exportMetrics() {
            try {
                window.open('/api/performance/metrics/export', '_blank');
            } catch (error) {
                showError('导出失败: ' + error.message);
            }
        }

        async function clearMetrics() {
            if (!confirm('确定要清空所有性能数据吗？')) return;

            try {
                const response = await fetch('/api/performance/clear', {
                    method: 'POST'
                });

                if (!response.ok) throw new Error('清空失败');

                await fetchDashboard();
                alert('性能数据已清空');
            } catch (error) {
                showError('清空失败: ' + error.message);
            }
        }

        // 初始加载
        fetchDashboard();

        // 自动刷新（每5秒）
        setInterval(() => {
            if (autoRefresh) {
                fetchDashboard();
            }
        }, 5000);
    </script>
</body>
</html>
