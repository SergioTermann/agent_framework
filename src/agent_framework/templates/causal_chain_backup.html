<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因果推理链 - 风起时域</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="/static/common-theme.css">
    <style>
        body {
            overflow-y: auto;
        }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
            position: relative;
            z-index: 5;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 60px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #34495e 0%, #3498db 50%, #9b59b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .card-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 500;
        }

        /* 输入区域 */
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 0.95em;
            font-weight: 500;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(184, 134, 11, 0.3);
            border-radius: 8px;
            color: #2c3e50;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: rgba(184, 134, 11, 0.6);
            box-shadow: 0 0 15px rgba(184, 134, 11, 0.2);
        }

        .form-help {
            display: block;
            margin-top: 6px;
            font-size: 0.85em;
            color: #7f8c8d;
            line-height: 1.4;
        }

        /* 按钮 */
        .btn {
            padding: 12px 30px;
            border: 1px solid rgba(184, 134, 11, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            background: linear-gradient(135deg, rgba(184, 134, 11, 0.1) 0%, rgba(120, 119, 198, 0.1) 100%);
            color: #2c3e50;
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(184, 134, 11, 0.2) 0%, rgba(120, 119, 198, 0.2) 100%);
            border-color: rgba(184, 134, 11, 0.5);
            color: #2c3e50;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(184, 134, 11, 0.3) 0%, rgba(120, 119, 198, 0.3) 100%);
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.2);
            transform: translateY(-2px);
        }

        /* 因果链可视化 */
        .chain-container {
            position: relative;
            padding: 40px 20px;
            min-height: 400px;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.5s ease;
        }

        .chain-node {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(184, 134, 11, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 700px;
            position: relative;
            animation: fadeIn 0.5s ease;
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.1);
            transition: all 0.3s;
        }

        .chain-node:hover {
            transform: translateX(10px);
            box-shadow: 0 6px 30px rgba(184, 134, 11, 0.2);
            border-color: rgba(184, 134, 11, 0.5);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .node-cause {
            background: rgba(184, 134, 11, 0.2);
            border: 1px solid rgba(184, 134, 11, 0.4);
            color: #3498db;
        }

        .node-effect {
            background: rgba(155, 89, 182, 0.2);
            border: 1px solid rgba(155, 89, 182, 0.4);
            color: #9b59b6;
        }

        .node-content {
            font-size: 1.05em;
            line-height: 1.7;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .node-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(184, 134, 11, 0.2);
        }

        .metric-item {
            background: rgba(184, 134, 11, 0.05);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85em;
        }

        .metric-label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 4px;
        }

        .metric-value {
            color: #2c3e50;
            font-weight: 600;
            font-size: 1.1em;
        }

        .node-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .node-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(155, 89, 182, 0.1);
            border: 1px solid rgba(155, 89, 182, 0.3);
            border-radius: 12px;
            font-size: 0.75em;
            color: #9b59b6;
            font-weight: 600;
        }

        .node-tag.primary {
            background: rgba(52, 152, 219, 0.1);
            border-color: rgba(52, 152, 219, 0.3);
            color: #3498db;
        }

        .node-tag.warning {
            background: rgba(230, 126, 34, 0.1);
            border-color: rgba(230, 126, 34, 0.3);
            color: #e67e22;
        }

        .node-tag.success {
            background: rgba(46, 204, 113, 0.1);
            border-color: rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .node-confidence {
            font-size: 0.9em;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .confidence-bar {
            flex: 1;
            height: 6px;
            background: rgba(184, 134, 11, 0.2);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 3px;
            transition: width 1s ease;
        }

        .chain-arrow {
            text-align: center;
            font-size: 2em;
            color: rgba(184, 134, 11, 0.5);
            margin: 10px 0;
            position: relative;
        }

        .chain-arrow::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 30px;
            background: linear-gradient(180deg, rgba(184, 134, 11, 0.3), rgba(184, 134, 11, 0.1));
        }

        .branch-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            position: relative;
        }

        .branch-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: -20px;
            width: 2px;
            height: 20px;
            background: rgba(184, 134, 11, 0.3);
        }

        .branch-node {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(155, 89, 182, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-size: 0.95em;
        }

        .branch-label {
            font-weight: 600;
            color: #9b59b6;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        /* 文件上传 */
        .file-upload {
            border: 2px dashed rgba(184, 134, 11, 0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.5);
        }

        .file-upload:hover {
            border-color: rgba(184, 134, 11, 0.6);
            background: rgba(184, 134, 11, 0.05);
        }

        .file-upload input {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 0.9em;
            color: #7f8c8d;
        }

        .file-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(184, 134, 11, 0.1);
            border: 1px solid rgba(184, 134, 11, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 10px;
        }

        .file-name {
            color: #2c3e50;
            font-weight: 500;
        }

        .btn-remove {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: rgba(231, 76, 60, 0.2);
            border-color: rgba(231, 76, 60, 0.5);
        }

        .chain-arrow {
            text-align: center;
            font-size: 2em;
            color: rgba(184, 134, 11, 0.5);
            margin: 10px 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(184, 134, 11, 0.5);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(184, 134, 11, 0.7);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(184, 134, 11, 0.2);
            border-top-color: #8b6914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 模板网格 */
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .template-card {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(184, 134, 11, 0.2);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .template-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #8b6914, #d4af37);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .template-card:hover {
            border-color: rgba(184, 134, 11, 0.5);
            box-shadow: 0 8px 25px rgba(184, 134, 11, 0.15);
            transform: translateY(-5px);
        }

        .template-card:hover::before {
            transform: scaleX(1);
        }

        .template-icon {
            font-size: 2.5em;
            margin-bottom: 12px;
        }

        .template-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .template-desc {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .template-preview {
            background: rgba(184, 134, 11, 0.05);
            border-left: 3px solid rgba(184, 134, 11, 0.4);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #2c3e50;
            margin-top: 12px;
        }

        .template-preview-label {
            font-weight: 600;
            color: #8b6914;
            margin-bottom: 6px;
        }

        .template-preview-text {
            color: #555;
            line-height: 1.4;
        }

        .template-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(184, 134, 11, 0.15);
            border-radius: 12px;
            font-size: 0.75em;
            color: #8b6914;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- 水墨画线条 -->
    <svg class="ink-lines" xmlns="http://www.w3.org/2000/svg">
        <path class="ink-line" d="M 50 100 Q 200 80, 350 120 T 650 100" stroke-dasharray="5,10" />
        <path class="ink-line thin" d="M 100 200 Q 300 180, 500 220 T 900 200" stroke-dasharray="3,8" />
        <path class="ink-line" d="M 0 300 Q 150 280, 300 310 Q 450 340, 600 300" stroke-dasharray="5,10" />
        <path class="ink-line thick" d="M 200 400 Q 400 370, 600 420 T 1000 400" stroke-dasharray="8,12" />
        <path class="ink-line thin" d="M 50 500 Q 250 480, 450 510 Q 650 540, 850 500" stroke-dasharray="3,8" />
        <path class="ink-line" d="M 150 600 Q 350 570, 550 610 T 950 600" stroke-dasharray="5,10" />
        <path class="ink-line thin" d="M 150 0 Q 130 200, 170 400 T 150 800" stroke-dasharray="3,8" />
        <path class="ink-line" d="M 400 0 Q 380 150, 420 300 Q 400 450, 420 600" stroke-dasharray="5,10" />
        <path class="ink-line thin" d="M 700 0 Q 680 180, 720 360 T 700 720" stroke-dasharray="3,8" />
        <path class="ink-line" d="M 950 0 Q 930 220, 970 440 T 950 880" stroke-dasharray="5,10" />
    </svg>

    <a href="{{ url_for('developer_home') }}" class="back-btn">
        <span>←</span>
        <span>返回主页</span>
    </a>

    <div class="container">
        <div class="header">
            <h1>🔗 因果推理链</h1>
            <p>分析事件之间的因果关系，构建推理链条</p>
        </div>

        <!-- 输入区域 -->
        <div class="card">
            <h2 class="card-title">输入事件</h2>
            <div class="input-section">
                <div class="form-group">
                    <label class="form-label">起始事件（原因）</label>
                    <textarea class="form-textarea" id="causeEvent" placeholder="例如：公司推出了新产品"></textarea>
                    <span class="form-help">💡 描述一个初始事件或原因</span>
                </div>

                <div class="form-group">
                    <label class="form-label">目标事件（结果）</label>
                    <textarea class="form-textarea" id="effectEvent" placeholder="例如：市场份额增加了20%"></textarea>
                    <span class="form-help">💡 描述期望分析的结果事件</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">背景信息（可选）</label>
                <textarea class="form-textarea" id="context" placeholder="提供相关的背景信息，帮助更准确地分析因果关系"></textarea>
                <span class="form-help">💡 提供额外的上下文信息，如行业背景、时间范围等</span>
            </div>

            <div class="form-group">
                <label class="form-label">上传文档（可选）</label>
                <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept=".txt,.pdf,.doc,.docx,.json" onchange="handleFileUpload(event)" />
                    <div class="upload-icon">📄</div>
                    <p class="upload-text">点击上传文档或拖拽文件到此处</p>
                    <p class="upload-hint">支持 TXT, PDF, DOC, DOCX, JSON 格式</p>
                </div>
                <div id="fileInfo" class="file-info" style="display: none;">
                    <span class="file-name"></span>
                    <button class="btn-remove" onclick="removeFile()">✕</button>
                </div>
                <span class="form-help">💡 上传包含相关信息的文档，系统将自动提取内容作为背景信息</span>
            </div>

            <button class="btn btn-primary" onclick="analyzeCausalChain()">🔍 分析因果链</button>
        </div>

        <!-- 预设思维链模板 -->
        <div class="card">
            <h2 class="card-title">💡 预设思维链模板</h2>
            <p style="color: #7f8c8d; margin-bottom: 20px;">点击任意模板快速填充，或作为参考示例</p>
            <div class="templates-grid" id="templatesGrid">
                <!-- 模板将通过 JS 动态生成 -->
            </div>
        </div>

        <!-- 因果链展示 -->
        <div class="card">
            <h2 class="card-title">因果推理链</h2>
            <div class="chain-container" id="chainContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">🔗</div>
                    <p>输入起始事件和目标事件，开始分析因果关系</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let uploadedFile = null;

        // 预设思维链模板 - 风力发电机专题（复杂版）
        const templates = [
            {
                icon: '🌪️',
                title: '风速变化影响链',
                desc: '风速波动对发电效率的直接影响',
                badge: '运行效率',
                cause: '区域平均风速从6.5m/s提升到8.2m/s',
                effect: '风电场年发电量增加45%，容量因子从28%提升到41%',
                context: '背景：沿海风电场运行数据分析。风机型号：3MW直驱永磁机组，轮毂高度90米。监测周期：连续3年气象数据。考虑因素：风切变、湍流强度、风向变化频率。',
                chain: [
                    {
                        type: 'cause',
                        content: '区域平均风速从6.5m/s提升到8.2m/s（提升26%）',
                        confidence: 0.98,
                        metrics: [
                            { label: '风速增幅', value: '+26%' },
                            { label: '测量高度', value: '90m' },
                            { label: '数据周期', value: '3年' }
                        ],
                        tags: ['气象数据', '实测值', '长期趋势']
                    },
                    {
                        type: 'effect',
                        content: '风轮扫掠面积接收的风能功率密度增加2.1倍（风能与风速三次方成正比）',
                        confidence: 0.95,
                        metrics: [
                            { label: '功率密度', value: '×2.1' },
                            { label: '理论依据', value: 'P∝v³' },
                            { label: '扫掠面积', value: '6362m²' }
                        ],
                        tags: ['物理定律', '能量转换', '理论计算'],
                        branches: [
                            { label: '低风速区(3-6m/s)', content: '运行时间从2200h降至800h，发电量占比从18%降至5%' },
                            { label: '额定风速区(6-12m/s)', content: '运行时间从3600h增至6400h，发电量占比从62%提升至85%' }
                        ]
                    },
                    {
                        type: 'effect',
                        content: '风机运行时间从年均5800小时增加到7200小时，进入额定功率区间频率提升55%',
                        confidence: 0.92,
                        metrics: [
                            { label: '运行时长', value: '+1400h' },
                            { label: '额定功率占比', value: '55%↑' },
                            { label: '满发时长', value: '6400h' }
                        ],
                        tags: ['运行特性', '功率曲线', '时间分布']
                    },
                    {
                        type: 'effect',
                        content: '单机年发电量从840万kWh提升至1220万kWh（增加45%）',
                        confidence: 0.90,
                        metrics: [
                            { label: '发电量增幅', value: '+380万kWh' },
                            { label: '单机容量', value: '3MW' },
                            { label: '增长率', value: '+45%' }
                        ],
                        tags: ['发电量', '核心指标', '经济效益'],
                        branches: [
                            { label: '春季(3-5月)', content: '发电量增幅62%，风速从5.8m/s升至9.1m/s' },
                            { label: '夏季(6-8月)', content: '发电量增幅28%，风速从7.2m/s升至8.5m/s' },
                            { label: '秋冬季(9-2月)', content: '发电量增幅51%，风速从6.1m/s升至8.8m/s' }
                        ]
                    },
                    {
                        type: 'effect',
                        content: '风电场容量因子从28%提升到41%，达到优质风资源标准（>35%）',
                        confidence: 0.88,
                        metrics: [
                            { label: '容量因子', value: '28%→41%' },
                            { label: '行业标准', value: '>35%优质' },
                            { label: '全国平均', value: '24%' }
                        ],
                        tags: ['容量因子', '资源评级', '行业对比']
                    },
                    {
                        type: 'effect',
                        content: '度电成本从0.38元降至0.28元，项目IRR从8.5%提升至12.3%，投资回收期缩短2.3年',
                        confidence: 0.85,
                        metrics: [
                            { label: '度电成本', value: '-26%' },
                            { label: 'IRR提升', value: '+3.8%' },
                            { label: '回收期', value: '-2.3年' },
                            { label: 'NPV增加', value: '+4200万' }
                        ],
                        tags: ['经济性', '投资回报', '财务指标']
                    }
                ]
            },
            {

        // 渲染模板
        function renderTemplates() {
            const grid = document.getElementById('templatesGrid');
            grid.innerHTML = templates.map((template, index) => `
                <div class="template-card" onclick="applyTemplate(${index})">
                    <div class="template-icon">${template.icon}</div>
                    <div class="template-title">${template.title}</div>
                    <div class="template-desc">${template.desc}</div>
                    <div class="template-badge">${template.badge}</div>
                    <div class="template-preview">
                        <div class="template-preview-label">原因 →</div>
                        <div class="template-preview-text">${template.cause.substring(0, 50)}...</div>
                    </div>
                </div>
            `).join('');
        }

        // 应用模板
        function applyTemplate(index) {
            const template = templates[index];

            // 填充输入框
            document.getElementById('causeEvent').value = template.cause;
            document.getElementById('effectEvent').value = template.effect;
            document.getElementById('context').value = template.context;

            // 直接展示预设的因果链
            displayCausalChain(template.chain);

            // 滚动到因果链展示区域
            document.getElementById('chainContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });

            // 添加视觉反馈
            const chainContainer = document.getElementById('chainContainer');
            chainContainer.style.borderColor = 'rgba(184, 134, 11, 0.6)';
            chainContainer.style.boxShadow = '0 0 25px rgba(184, 134, 11, 0.3)';
            setTimeout(() => {
                chainContainer.style.borderColor = '';
                chainContainer.style.boxShadow = '';
            }, 1500);
        }

        // 页面加载时渲染模板
        document.addEventListener('DOMContentLoaded', renderTemplates);

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            uploadedFile = file;

            // 显示文件信息
            const fileInfo = document.getElementById('fileInfo');
            const fileName = fileInfo.querySelector('.file-name');
            fileName.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
            fileInfo.style.display = 'flex';

            // 读取文件内容并填充到背景信息
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const contextArea = document.getElementById('context');

                // 如果背景信息为空，则填充文件内容
                if (!contextArea.value.trim()) {
                    contextArea.value = content.substring(0, 5000); // 限制长度
                } else {
                    // 如果已有内容，追加文件内容
                    contextArea.value += '\n\n--- 文档内容 ---\n' + content.substring(0, 5000);
                }
            };
            reader.readAsText(file);
        }

        function removeFile() {
            uploadedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').style.display = 'none';
        }

        async function analyzeCausalChain() {
            const cause = document.getElementById('causeEvent').value.trim();
            const effect = document.getElementById('effectEvent').value.trim();
            const context = document.getElementById('context').value.trim();

            if (!cause || !effect) {
                alert('请输入起始事件和目标事件');
                return;
            }

            const container = document.getElementById('chainContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在分析因果关系...</p></div>';

            try {
                const response = await fetch('/api/causal-chain/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cause, effect, context })
                });

                if (response.ok) {
                    const data = await response.json();
                    displayCausalChain(data.chain);
                } else {
                    container.innerHTML = '<div class="empty-state"><p>分析失败，请重试</p></div>';
                }
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="empty-state"><p>分析失败: ' + error.message + '</p></div>';
            }
        }

        function displayCausalChain(chain) {
            const container = document.getElementById('chainContainer');

            if (!chain || chain.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>未找到明确的因果关系</p></div>';
                return;
            }

            let html = '';
            chain.forEach((node, index) => {
                html += `
                    <div class="chain-node">
                        <span class="node-type ${node.type === 'cause' ? 'node-cause' : 'node-effect'}">
                            ${node.type === 'cause' ? '🎯 原因' : '📊 结果'} ${index + 1}
                        </span>
                        <div class="node-content">${node.content}</div>

                        ${node.metrics ? `
                            <div class="node-metrics">
                                ${node.metrics.map(m => `
                                    <div class="metric-item">
                                        <div class="metric-label">${m.label}</div>
                                        <div class="metric-value">${m.value}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        ${node.tags ? `
                            <div class="node-tags">
                                ${node.tags.map((tag, i) => {
                                    const tagClass = i === 0 ? 'primary' : (i === 1 ? 'success' : '');
                                    return `<span class="node-tag ${tagClass}">${tag}</span>`;
                                }).join('')}
                            </div>
                        ` : ''}

                        <div class="node-confidence">
                            <span>置信度: ${(node.confidence * 100).toFixed(0)}%</span>
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${node.confidence * 100}%"></div>
                            </div>
                        </div>
                    </div>
                `;

                // 添加分支节点
                if (node.branches && node.branches.length > 0) {
                    html += '<div class="branch-container">';
                    node.branches.forEach(branch => {
                        html += `
                            <div class="branch-node">
                                <div class="branch-label">${branch.label}</div>
                                <div>${branch.content}</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                if (index < chain.length - 1) {
                    html += '<div class="chain-arrow">↓</div>';
                }
            });

            container.innerHTML = html;

            // 触发动画
            setTimeout(() => {
                document.querySelectorAll('.confidence-fill').forEach(fill => {
                    fill.style.width = fill.style.width;
                });
            }, 100);
        }
    </script>
</body>
</html>
