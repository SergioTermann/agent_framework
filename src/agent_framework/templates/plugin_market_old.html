<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件市场 - Agent Framework</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="/static/css/base-theme.css">
    <style>
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        .search-section {
            margin-bottom: 40px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            background: rgba(184, 134, 11, 0.04);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tab.active {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary-deep);
        }

        .filter-tab:hover {
            background: rgba(184, 134, 11, 0.06);
        }

        .plugins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .plugin-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .plugin-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-gold);
            border-color: var(--line-strong);
        }

        .plugin-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .plugin-icon {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            box-shadow: var(--shadow-gold);
        }

        .plugin-info {
            flex: 1;
        }

        .plugin-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .plugin-author {
            font-size: 13px;
            color: var(--muted);
        }

        .plugin-description {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .plugin-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--muted);
        }

        .plugin-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .plugin-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .plugin-tag {
            padding: 4px 10px;
            background: var(--primary-soft);
            border-radius: 6px;
            font-size: 12px;
            color: var(--primary-deep);
        }

        .plugin-actions {
            display: flex;
            gap: 8px;
        }

        .btn-install {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-install:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .btn-install.installed {
            background: rgba(22, 163, 74, 0.15);
            color: var(--success);
        }

        .btn-details {
            padding: 10px 16px;
            background: rgba(184, 134, 11, 0.06);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-details:hover {
            background: rgba(184, 134, 11, 0.10);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--muted);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 35, 63, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(184, 134, 11, 0.06);
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(184, 134, 11, 0.12);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .star {
            color: #d4af37;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
    <link rel="stylesheet" href="/static/css/submodule-theme.css?v=1.0">
</head>
<body>
    <div class="page-wide">
        <nav class="topbar">
            <div class="brand">
                <a class="back-link" href="/developer">← 返回</a>
                <h1>插件市场</h1>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-secondary" onclick="window.location.href='/profile'">我的插件</button>
                <button class="btn btn-primary" onclick="showUploadModal()">+ 上传插件</button>
            </div>
        </nav>
    </div>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalPlugins">0</div>
                <div class="stat-label">总插件数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="installedPlugins">0</div>
                <div class="stat-label">已安装</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalDownloads">0</div>
                <div class="stat-label">总下载量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgRating">0.0</div>
                <div class="stat-label">平均评分</div>
            </div>
        </div>

        <div class="search-section">
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索插件...">
                <button class="btn btn-primary" onclick="searchPlugins()">搜索</button>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterPlugins('all')">全部</button>
                <button class="filter-tab" onclick="filterPlugins('ai')">AI 增强</button>
                <button class="filter-tab" onclick="filterPlugins('data')">数据处理</button>
                <button class="filter-tab" onclick="filterPlugins('integration')">集成工具</button>
                <button class="filter-tab" onclick="filterPlugins('utility')">实用工具</button>
                <button class="filter-tab" onclick="filterPlugins('popular')">热门</button>
                <button class="filter-tab" onclick="filterPlugins('new')">最新</button>
            </div>
        </div>

        <div class="plugins-grid" id="pluginsGrid">
            <!-- 插件卡片将动态加载 -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📦</div>
            <h3>暂无插件</h3>
            <p>没有找到匹配的插件</p>
        </div>
    </div>

    <!-- 插件详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">插件详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody">
                <!-- 详情内容 -->
            </div>
        </div>
    </div>

    <script>
        // 示例插件数据
        const plugins = [
            {
                id: 'weather-api',
                name: '天气查询',
                author: 'Agent Team',
                description: '实时天气查询插件，支持全球主要城市天气信息获取',
                icon: '🌤️',
                category: 'integration',
                tags: ['天气', 'API', '实用工具'],
                rating: 4.8,
                downloads: 1250,
                installed: false,
                version: '1.2.0',
                readme: '# 天气查询插件\n\n提供实时天气查询功能...'
            },
            {
                id: 'text-analyzer',
                name: '文本分析',
                author: 'AI Labs',
                description: '强大的文本分析工具，支持情感分析、关键词提取、摘要生成',
                icon: '📝',
                category: 'ai',
                tags: ['NLP', 'AI', '文本处理'],
                rating: 4.9,
                downloads: 2100,
                installed: true,
                version: '2.0.1',
                readme: '# 文本分析插件\n\n提供多种文本分析功能...'
            },
            {
                id: 'data-visualizer',
                name: '数据可视化',
                author: 'Data Team',
                description: '将数据转换为精美的图表，支持多种图表类型',
                icon: '📊',
                category: 'data',
                tags: ['可视化', '图表', '数据'],
                rating: 4.7,
                downloads: 1800,
                installed: false,
                version: '1.5.0',
                readme: '# 数据可视化插件\n\n支持多种图表类型...'
            },
            {
                id: 'code-executor',
                name: '代码执行器',
                author: 'Dev Tools',
                description: '安全的代码执行环境，支持多种编程语言',
                icon: '💻',
                category: 'utility',
                tags: ['代码', '执行', '开发'],
                rating: 4.6,
                downloads: 950,
                installed: true,
                version: '1.0.5',
                readme: '# 代码执行器\n\n安全的代码执行环境...'
            },
            {
                id: 'translator',
                name: '智能翻译',
                author: 'Language AI',
                description: '基于 AI 的智能翻译工具，支持100+语言',
                icon: '🌐',
                category: 'ai',
                tags: ['翻译', 'AI', '语言'],
                rating: 4.9,
                downloads: 3200,
                installed: false,
                version: '3.1.0',
                readme: '# 智能翻译插件\n\n支持100+语言翻译...'
            },
            {
                id: 'image-processor',
                name: '图像处理',
                author: 'Vision AI',
                description: '图像处理和识别工具，支持多种图像操作',
                icon: '🖼️',
                category: 'ai',
                tags: ['图像', 'AI', '视觉'],
                rating: 4.8,
                downloads: 1600,
                installed: false,
                version: '2.2.0',
                readme: '# 图像处理插件\n\n提供图像处理和识别功能...'
            }
        ];

        let currentFilter = 'all';
        let currentSearch = '';

        // 初始化
        function init() {
            updateStats();
            renderPlugins();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalPlugins').textContent = plugins.length;
            document.getElementById('installedPlugins').textContent = plugins.filter(p => p.installed).length;
            document.getElementById('totalDownloads').textContent = plugins.reduce((sum, p) => sum + p.downloads, 0).toLocaleString();
            const avgRating = (plugins.reduce((sum, p) => sum + p.rating, 0) / plugins.length).toFixed(1);
            document.getElementById('avgRating').textContent = avgRating;
        }

        // 渲染插件列表
        function renderPlugins() {
            const grid = document.getElementById('pluginsGrid');
            const emptyState = document.getElementById('emptyState');

            let filtered = plugins;

            // 应用分类过滤
            if (currentFilter !== 'all') {
                if (currentFilter === 'popular') {
                    filtered = filtered.filter(p => p.downloads > 1500);
                } else if (currentFilter === 'new') {
                    filtered = filtered.slice(-3);
                } else {
                    filtered = filtered.filter(p => p.category === currentFilter);
                }
            }

            // 应用搜索过滤
            if (currentSearch) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    p.description.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    p.tags.some(tag => tag.toLowerCase().includes(currentSearch.toLowerCase()))
                );
            }

            if (filtered.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = filtered.map(plugin => `
                <div class="plugin-card" onclick="showPluginDetails('${plugin.id}')">
                    <div class="plugin-header">
                        <div class="plugin-icon">${plugin.icon}</div>
                        <div class="plugin-info">
                            <div class="plugin-name">${plugin.name}</div>
                            <div class="plugin-author">by ${plugin.author}</div>
                        </div>
                    </div>
                    <div class="plugin-description">${plugin.description}</div>
                    <div class="plugin-meta">
                        <div class="plugin-meta-item">
                            <div class="rating">
                                ${'★'.repeat(Math.floor(plugin.rating))}${'☆'.repeat(5 - Math.floor(plugin.rating))}
                            </div>
                            <span>${plugin.rating}</span>
                        </div>
                        <div class="plugin-meta-item">
                            📥 ${plugin.downloads.toLocaleString()}
                        </div>
                        <div class="plugin-meta-item">
                            v${plugin.version}
                        </div>
                    </div>
                    <div class="plugin-tags">
                        ${plugin.tags.map(tag => `<span class="plugin-tag">${tag}</span>`).join('')}
                    </div>
                    <div class="plugin-actions" onclick="event.stopPropagation()">
                        <button class="btn-install ${plugin.installed ? 'installed' : ''}"
                                onclick="toggleInstall('${plugin.id}')">
                            ${plugin.installed ? '✓ 已安装' : '安装'}
                        </button>
                        <button class="btn-details" onclick="showPluginDetails('${plugin.id}')">
                            详情
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 过滤插件
        function filterPlugins(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            renderPlugins();
        }

        // 搜索插件
        function searchPlugins() {
            currentSearch = document.getElementById('searchInput').value;
            renderPlugins();
        }

        // 切换安装状态
        function toggleInstall(pluginId) {
            const plugin = plugins.find(p => p.id === pluginId);
            if (plugin) {
                plugin.installed = !plugin.installed;
                updateStats();
                renderPlugins();
            }
        }

        // 显示插件详情
        function showPluginDetails(pluginId) {
            const plugin = plugins.find(p => p.id === pluginId);
            if (!plugin) return;

            document.getElementById('modalTitle').textContent = plugin.name;
            document.getElementById('modalBody').innerHTML = `
                <div style="margin-bottom: 24px;">
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
                        <div style="font-size: 48px;">${plugin.icon}</div>
                        <div>
                            <h3 style="margin-bottom: 4px;">${plugin.name}</h3>
                            <p style="color: var(--muted);">by ${plugin.author}</p>
                        </div>
                    </div>
                    <p style="color: var(--muted); margin-bottom: 16px;">${plugin.description}</p>
                    <div style="display: flex; gap: 24px; margin-bottom: 16px;">
                        <div>
                            <strong>版本:</strong> ${plugin.version}
                        </div>
                        <div>
                            <strong>评分:</strong> ${plugin.rating} ★
                        </div>
                        <div>
                            <strong>下载:</strong> ${plugin.downloads.toLocaleString()}
                        </div>
                    </div>
                    <div style="margin-bottom: 16px;">
                        ${plugin.tags.map(tag => `<span class="plugin-tag">${tag}</span>`).join('')}
                    </div>
                    <div style="background: rgba(184, 134, 11, 0.04); padding: 16px; border-radius: 8px; margin-bottom: 16px;">
                        <pre style="white-space: pre-wrap; color: var(--muted);">${plugin.readme}</pre>
                    </div>
                    <button class="btn-install" style="width: 100%;" onclick="toggleInstall('${plugin.id}'); closeModal();">
                        ${plugin.installed ? '卸载插件' : '安装插件'}
                    </button>
                </div>
            `;

            document.getElementById('detailModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 显示上传模态框
        function showUploadModal() {
            alert('插件上传功能开发中...');
        }

        // 搜索框回车事件
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchPlugins();
                }
            });
            init();
        });
    </script>
</body>
</html>
