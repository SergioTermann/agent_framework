<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话助手 - Agent Framework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f8fc 0%, #eff4fb 100%);
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f4eb3 0%, #1363df 52%, #2b7fff 100%);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
        }

        .sidebar-header {
            padding: 28px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .sidebar-logo {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-item {
            padding: 12px 24px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid white;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #ffffff;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(101, 120, 144, 0.14);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 20px;
            color: #253038;
            font-weight: 600;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #1363df, #60a5fa);
            color: #ffffff;
        }

        .message.assistant .message-avatar {
            background: #e3ecff;
            color: #1363df;
        }

        .message-content {
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid rgba(101, 120, 144, 0.14);
            color: #253038;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #1363df, #60a5fa);
            color: #ffffff;
            border: none;
        }

        .input-area {
            background: #ffffff;
            border: 1px solid rgba(101, 120, 144, 0.14);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-family: inherit;
            font-size: 15px;
            color: #253038;
            min-height: 24px;
            max-height: 120px;
        }

        .input-area button {
            background: linear-gradient(135deg, #1363df, #60a5fa);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-area button:hover {
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1363df;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    🤖 Agent Framework
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <span>🏠</span>
                    <span>首页</span>
                </a>
                <a href="/chat" class="nav-item active">
                    <span>💬</span>
                    <span>对话助手</span>
                </a>
                <a href="/visual_workflow" class="nav-item">
                    <span>🔄</span>
                    <span>工作流编排</span>
                </a>
                <a href="/knowledge" class="nav-item">
                    <span>📚</span>
                    <span>知识库</span>
                </a>
            </nav>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="header">
                <h1>💬 对话助手</h1>
            </div>

            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="message assistant">
                        <div class="message-avatar">🤖</div>
                        <div class="message-content">你好！我是AI助手，有什么可以帮助你的吗？</div>
                    </div>
                </div>

                <div class="input-area">
                    <textarea id="userInput" placeholder="输入消息..." rows="1"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            showLoading();

            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                removeLoading();
                addMessage('assistant', data.response || '抱歉，我现在无法回答。');
                sendBtn.disabled = false;
            })
            .catch(error => {
                removeLoading();
                addMessage('assistant', '抱歉，发生了错误。请稍后再试。');
                sendBtn.disabled = false;
            });
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.innerHTML = '<span></span><span></span><span></span>';

            contentDiv.appendChild(loading);
            loadingDiv.appendChild(avatar);
            loadingDiv.appendChild(contentDiv);
            messagesDiv.appendChild(loadingDiv);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.remove();
            }
        }
    </script>
</body>
</html>
