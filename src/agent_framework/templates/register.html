<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Agent Framework</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"> -->
    <style>
        :root {
            --theme-accent: #1363df;
            --theme-accent-deep: #0f4eb3;
            --theme-accent-soft: rgba(19, 99, 223, 0.12);
            --theme-accent-line: rgba(19, 99, 223, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei UI', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef5ff 0%, #f7fbff 52%, #edf4fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(15, 78, 179, 0.14);
            border: 1px solid var(--theme-accent-line);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--theme-accent-deep), var(--theme-accent));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(19, 99, 223, 0.24);
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--theme-accent-deep);
            margin-bottom: 8px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--theme-accent-deep);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--theme-accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(19, 99, 223, 0.1);
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .password-strength-weak { background: #ef4444; width: 33%; }
        .password-strength-medium { background: #60a5fa; width: 66%; }
        .password-strength-strong { background: #22c55e; width: 100%; }

        .terms {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 24px;
            color: #94a3b8;
            font-size: 14px;
        }

        .terms input[type="checkbox"] {
            margin-top: 2px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .terms a {
            color: var(--theme-accent-deep);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .btn-register {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--theme-accent-deep), var(--theme-accent));
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(19, 99, 223, 0.22);
        }

        .btn-register:hover {
            box-shadow: 0 6px 20px rgba(19, 99, 223, 0.3);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }

        .login-link a {
            color: var(--theme-accent-deep);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            color: var(--theme-accent);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <h1>创建账号</h1>
                <p>加入 Agent Framework 开始构建 AI 应用</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名（3-20个字符）" required minlength="3" maxlength="20">
                </div>

                <div class="form-group">
                    <label for="email">邮箱 *</label>
                    <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
                </div>

                <div class="form-group">
                    <label for="full_name">姓名</label>
                    <input type="text" id="full_name" name="full_name" placeholder="请输入真实姓名（可选）">
                </div>

                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码（至少8个字符）" required minlength="8">
                    <div class="password-strength">
                        <div id="passwordStrengthBar" class="password-strength-bar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">确认密码 *</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required>
                </div>

                <div class="terms">
                    <input type="checkbox" id="agree_terms" required>
                    <label for="agree_terms">
                        我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
                    </label>
                </div>

                <button type="submit" class="btn-register" id="registerBtn">注册</button>
            </form>

            <div class="login-link">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // 密码强度检测
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrengthBar');

            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthBar.className = 'password-strength-bar';
            if (strength <= 1) {
                strengthBar.classList.add('password-strength-weak');
            } else if (strength <= 3) {
                strengthBar.classList.add('password-strength-medium');
            } else {
                strengthBar.classList.add('password-strength-strong');
            }
        });

        // 注册表单处理
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const fullName = document.getElementById('full_name').value;
            const agreeTerms = document.getElementById('agree_terms').checked;
            const registerBtn = document.getElementById('registerBtn');
            const alert = document.getElementById('alert');

            // 验证密码
            if (password !== confirmPassword) {
                alert.className = 'alert alert-error';
                alert.textContent = '两次输入的密码不一致';
                alert.style.display = 'block';
                return;
            }

            if (!agreeTerms) {
                alert.className = 'alert alert-error';
                alert.textContent = '请同意服务条款和隐私政策';
                alert.style.display = 'block';
                return;
            }

            // 禁用按钮
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        full_name: fullName || null,
                    }),
                });

                const data = await response.json();

                if (data.success) {
                    // 保存 Token
                    localStorage.setItem('auth_token', data.data.token);

                    // 显示成功消息
                    alert.className = 'alert alert-success';
                    alert.textContent = '注册成功！正在跳转...';
                    alert.style.display = 'block';

                    // 跳转到主页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    // 显示错误消息
                    alert.className = 'alert alert-error';
                    alert.textContent = data.error || '注册失败，请稍后重试';
                    alert.style.display = 'block';

                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                }
            } catch (error) {
                alert.className = 'alert alert-error';
                alert.textContent = '网络错误，请稍后重试';
                alert.style.display = 'block';

                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
