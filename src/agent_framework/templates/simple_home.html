<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风起时域 - 智能工作台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            gap: 0;
        }

        /* 左侧导航 */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 14px;
            color: #6b7280;
        }

        .nav-section {
            margin-bottom: 30px;
        }

        .nav-title {
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: #374151;
        }

        .nav-item:hover {
            background: #f3f4f6;
            color: #1f2937;
        }

        .nav-item.active {
            background: #3b82f6;
            color: white;
        }

        .nav-item .icon {
            font-size: 20px;
            margin-right: 12px;
        }

        .nav-item .text {
            flex: 1;
        }

        .nav-item .title {
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .nav-item .desc {
            font-size: 12px;
            opacity: 0.7;
        }

        /* 右侧内容区 */
        .chat-area {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e5e7eb;
            background: #ffffff;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1f2937;
        }

        .chat-header p {
            font-size: 14px;
            color: #6b7280;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #ffffff;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: #3b82f6;
            color: white;
        }

        .message.user .message-avatar {
            background: #e5e7eb;
            color: #6b7280;
        }

        .message-content {
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            border: 1px solid #e5e7eb;
            color: #374151;
        }

        .message.user .message-content {
            background: #3b82f6;
            color: white;
            border: none;
        }

        .chat-input-area {
            padding: 20px 30px;
            border-top: 1px solid #e5e7eb;
            background: #ffffff;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .send-button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .send-button:hover {
            background: #2563eb;
        }

        .send-button:active {
            transform: scale(0.98);
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* 欢迎消息 */
        .welcome-message {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .welcome-message img {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧导航 -->
        <aside class="sidebar">
            <div class="logo">
                <h1>风起时域</h1>
                <p>智能工作台</p>
            </div>

            <div class="nav-section">
                <div class="nav-title">核心功能</div>

                <div class="nav-item" onclick="loadPage('/modules/weather-siting/app')">
                    <span class="material-symbols-outlined icon">location_on</span>
                    <div class="text">
                        <span class="title">风场选址</span>
                        <span class="desc">资源评估与智能选址</span>
                    </div>
                </div>

                <div class="nav-item" onclick="loadPage('/modules/smart-workorder/app')">
                    <span class="material-symbols-outlined icon">assignment</span>
                    <div class="text">
                        <span class="title">智能工单</span>
                        <span class="desc">工单管理与派发</span>
                    </div>
                </div>

                <div class="nav-item" onclick="loadPage('/data-platform')">
                    <span class="material-symbols-outlined icon">monitoring</span>
                    <div class="text">
                        <span class="title">智能值守</span>
                        <span class="desc">实时监控与告警</span>
                    </div>
                </div>

                <div class="nav-item" onclick="loadPage('/modules/power-trading/app')">
                    <span class="material-symbols-outlined icon">trending_up</span>
                    <div class="text">
                        <span class="title">电力交易</span>
                        <span class="desc">市场分析与交易策略</span>
                    </div>
                </div>

                <div class="nav-item" onclick="loadPage('/maintenance-assistant')">
                    <span class="material-symbols-outlined icon">smart_toy</span>
                    <div class="text">
                        <span class="title">智导助手</span>
                        <span class="desc">智能运维助手</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧内容区 -->
        <main class="chat-area">
            <div class="chat-header">
                <h2 id="pageTitle">智能对话助手</h2>
                <p id="pageDesc">我可以帮您解答问题、分析数据、生成报告</p>
            </div>

            <!-- iframe 容器 -->
            <iframe id="contentFrame" style="display:none; width:100%; height:100%; border:none; flex:1;"></iframe>

            <!-- 对话区（默认显示）-->
            <div id="chatContainer" style="display:flex; flex-direction:column; flex:1;">
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <img src="/主页.png" alt="主页">
                    </div>
                </div>

                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <input
                            type="text"
                            class="chat-input"
                            id="chatInput"
                            placeholder="输入您的问题..."
                            onkeypress="if(event.key==='Enter') sendMessage()"
                        >
                        <button class="send-button" onclick="sendMessage()">
                            <span class="material-symbols-outlined">send</span>
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const contentFrame = document.getElementById('contentFrame');
        const chatContainer = document.getElementById('chatContainer');
        const pageTitle = document.getElementById('pageTitle');
        const pageDesc = document.getElementById('pageDesc');

        const moduleInfo = {
            'weather-siting': { title: '风场选址', desc: '资源评估与智能选址决策' },
            'smart-workorder': { title: '智能工单', desc: '工单管理与智能派发系统' },
            'smart-watch': { title: '智能值守', desc: '实时监控与告警管理' },
            'power-trading': { title: '电力交易', desc: '市场分析与交易策略' },
            'assistant': { title: '智导助手', desc: '智能运维助手' }
        };

        function loadPage(url) {
            // 隐藏对话区，显示 iframe
            chatContainer.style.display = 'none';
            contentFrame.style.display = 'block';
            contentFrame.src = url;

            // 更新标题
            const moduleName = url.includes('weather-siting') ? '风场选址' :
                              url.includes('smart-workorder') ? '智能工单' :
                              url.includes('data-platform') ? '智能值守' :
                              url.includes('power-trading') ? '电力交易' :
                              url.includes('maintenance-assistant') ? '智导助手' : '功能页面';

            pageTitle.textContent = moduleName;
            pageDesc.textContent = '正在加载...';

            // 更新导航高亮
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }

        function showChat() {
            // 显示对话区，隐藏 iframe
            chatContainer.style.display = 'flex';
            contentFrame.style.display = 'none';
            pageTitle.textContent = '智能对话助手';
            pageDesc.textContent = '我可以帮您解答问题、分析数据、生成报告';
        }

        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // 添加用户消息
            addMessage(message, 'user');
            chatInput.value = '';

            // 添加加载提示
            const loadingId = 'loading-' + Date.now();
            addMessage('正在思考...', 'assistant', loadingId);

            // 发送到 Dify API
            fetch('http://localhost/v1/chat-messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer app-233RDt5D334pVyt5I3rIcPLQ'
                },
                body: JSON.stringify({
                    inputs: {},
                    query: message,
                    response_mode: 'blocking',
                    conversation_id: '',
                    user: 'user-' + Date.now()
                })
            })
            .then(response => response.json())
            .then(data => {
                // 移除加载提示
                const loadingMsg = document.getElementById(loadingId);
                if (loadingMsg) {
                    loadingMsg.remove();
                }

                // 显示 AI 回复
                if (data.answer) {
                    addMessage(data.answer, 'assistant');
                } else {
                    addMessage('抱歉，没有收到回复。', 'assistant');
                }
            })
            .catch(error => {
                // 移除加载提示
                const loadingMsg = document.getElementById(loadingId);
                if (loadingMsg) {
                    loadingMsg.remove();
                }

                console.error('Error:', error);
                addMessage('抱歉，连接 Dify 服务失败，请检查服务是否正常运行。', 'assistant');
            });
        }

        function addMessage(text, type, id) {
            // 移除欢迎消息
            const welcome = chatMessages.querySelector('.welcome-message');
            if (welcome) {
                welcome.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            if (id) {
                messageDiv.id = id;
            }

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = `<span class="material-symbols-outlined">${type === 'user' ? 'person' : 'smart_toy'}</span>`;

            const content = document.createElement('div');
            content.className = 'message-content';
            content.style.whiteSpace = 'pre-wrap';
            content.textContent = text;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatMessages.appendChild(messageDiv);

            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
