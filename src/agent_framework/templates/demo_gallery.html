<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示案例库 - 风起时域</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="/static/common-theme.css?v=3.0">
    <style>
        :root {
            --theme-accent: #1363df;
            --theme-accent-deep: #0f4eb3;
            --theme-accent-line: rgba(19, 99, 223, 0.2);
            --theme-accent-shadow: rgba(19, 99, 223, 0.18);
        }

        body {
            overflow-y: auto;
        }
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 40px;
            position: relative;
            z-index: 5;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 60px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--theme-accent-deep) 0%, var(--theme-accent) 52%, #7dd3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
        }
        .header p {
            color: rgba(15, 78, 179, 0.76);
            font-size: 1.1em;
        }
        .examples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .example-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px var(--theme-accent-shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .example-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(19, 99, 223, 0.22);
            border-color: rgba(19, 99, 223, 0.36);
        }
        .example-title {
            font-size: 1.5em;
            font-weight: 600;
            color: var(--theme-accent-deep);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .example-icon {
            font-size: 1.2em;
        }
        .example-info {
            margin-bottom: 15px;
        }
        .example-label {
            font-size: 0.9em;
            color: #7f8c8d;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .example-value {
            color: #34495e;
            font-size: 1em;
            line-height: 1.6;
        }
        .example-context {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95em;
            color: #5a6c7d;
            line-height: 1.6;
        }
        .example-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        .btn-secondary {
            background: #ecf0f1;
            color: #34495e;
        }
        .btn-secondary:hover {
            background: #d5dbdb;
        }
        .stats {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            border: 1px solid var(--theme-accent-line);
            box-shadow: 0 5px 15px rgba(19, 99, 223, 0.08);
        }
        .stats-number {
            font-size: 3em;
            font-weight: 700;
            color: var(--theme-accent);
            margin-bottom: 5px;
        }
        .stats-label {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        .arrow {
            color: var(--theme-accent);
            font-weight: bold;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>演示案例库</h1>
            <p>探索各领域的因果关系链条</p>
        </div>
        <a href="{{ url_for('developer_home') }}" class="back-btn">
            <span class="back-btn-icon">←</span>
            <span>返回主页</span>
        </a>
        <div class="stats">
            <div class="stats-number" id="total-count">0</div>
            <div class="stats-label">个演示案例</div>
        </div>
        <div class="examples-grid" id="examples-container"></div>
    </div>
    <script>
        const iconMap = {
            'tech_innovation': '🚀',
            'climate_change': '🌍',
            'education_reform': '📚',
            'pandemic_impact': '🏥',
            'ai_development': '🤖',
            'urbanization': '🏙️'
        };
        async function loadExamples() {
            try {
                const response = await fetch('/api/causal-chain/demos');
                const data = await response.json();
                if (data.demos) {
                    const container = document.getElementById('examples-container');
                    document.getElementById('total-count').textContent = data.demos.length;
                    data.demos.forEach(demo => {
                        const card = createExampleCard(demo);
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('加载演示案例失败:', error);
                alert('加载演示案例失败: ' + error.message);
            }
        }
        function createExampleCard(demo) {
            const card = document.createElement('div');
            card.className = 'example-card';
            const icon = iconMap[demo.id] || '📊';
            const demoUrl = '/causal-tree?demo=' + demo.id;
            card.innerHTML = '<div class="example-title"><span class="example-icon">' + icon + '</span>' + demo.title + '</div><div class="example-info"><div class="example-label">起始事件</div><div class="example-value">' + demo.cause + '</div></div><div style="text-align: center; margin: 10px 0;"><span class="arrow">↓</span></div><div class="example-info"><div class="example-label">目标事件</div><div class="example-value">' + demo.effect + '</div></div><div class="example-context"><strong>背景：</strong>' + demo.context + '</div><div class="example-actions"><button class="btn btn-primary" onclick="window.location.href=\'' + demoUrl + '\'">查看推理树</button><button class="btn btn-secondary" onclick="copyExample(\'' + demo.id + '\')">复制信息</button></div>';
            return card;
        }
        function copyExample(demoId) {
            fetch('/api/causal-chain/demos/' + demoId).then(res => res.json()).then(demo => {
                const text = '【' + demo.title + '】\n起始事件: ' + demo.cause + '\n目标事件: ' + demo.effect + '\n背景: ' + demo.context;
                navigator.clipboard.writeText(text).then(() => { alert('已复制到剪贴板！'); });
            }).catch(err => { console.error('复制失败:', err); alert('复制失败'); });
        }
        document.addEventListener('DOMContentLoaded', loadExamples);
    </script>
</body>
</html>
