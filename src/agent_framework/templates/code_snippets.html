<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码片段管理 - Agent Framework</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..700,0..1&display=swap" rel="stylesheet">
    <style>
        :root {
            --cs-accent:       #0d9488;
            --cs-accent-deep:  #1363df;
            --cs-accent-soft:  rgba(13, 148, 136, 0.10);
            --cs-bg:           #f0fdfa;
            --cs-surface:      rgba(255, 255, 255, 0.82);
            --cs-border:       rgba(13, 148, 136, 0.14);
            --cs-text:         #0f2926;
            --cs-muted:        #5b7875;
            --cs-shadow:       0 2px 14px rgba(13, 148, 136, 0.07);
            --cs-shadow-md:    0 8px 32px rgba(13, 148, 136, 0.12);
            --cs-radius:       20px;
            --cs-radius-sm:    12px;
            --cs-danger:       #dc2626;
            --cs-warn:         #d97706;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { min-height: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cs-bg);
            background-image:
                radial-gradient(circle at 14% 20%, rgba(13, 148, 136, 0.16), transparent 36%),
                radial-gradient(circle at 84% 72%, rgba(20, 184, 166, 0.12), transparent 30%),
                radial-gradient(circle at 50% 100%, rgba(13, 148, 136, 0.07), transparent 26%);
            color: var(--cs-text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(13,148,136,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13,148,136,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .cs-shell {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 28px 80px;
        }

        /* ── Topbar ── */
        .cs-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .cs-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .cs-brand-mark {
            width: 38px; height: 38px;
            background: var(--cs-accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            flex-shrink: 0;
        }

        .cs-brand-copy strong {
            display: block;
            font-family: 'Manrope', sans-serif;
            font-size: 15px;
            color: var(--cs-text);
        }

        .cs-brand-copy small {
            font-size: 12px;
            color: var(--cs-muted);
        }

        .cs-topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── Buttons ── */
        .cs-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
            text-decoration: none;
            font-family: inherit;
        }

        .cs-btn:active { transform: scale(0.97); }

        .cs-btn-primary {
            background: var(--cs-accent);
            color: #fff;
        }

        .cs-btn-primary:hover { background: var(--cs-accent-deep); }

        .cs-btn-ghost {
            background: var(--cs-surface);
            color: var(--cs-text);
            border: 1px solid var(--cs-border);
            backdrop-filter: blur(8px);
        }

        .cs-btn-ghost:hover { background: rgba(255,255,255,0.95); }

        .cs-btn-danger {
            background: rgba(220,38,38,0.09);
            color: var(--cs-danger);
            border: 1px solid rgba(220,38,38,0.17);
        }

        .cs-btn-danger:hover { background: rgba(220,38,38,0.15); }

        .cs-btn-sm {
            padding: 5px 11px;
            font-size: 12px;
            border-radius: 7px;
        }

        /* ── Stats strip ── */
        .cs-stats-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .cs-stat-card {
            background: var(--cs-surface);
            border: 1px solid var(--cs-border);
            border-radius: var(--cs-radius-sm);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            box-shadow: var(--cs-shadow);
        }

        .cs-stat-icon {
            width: 44px; height: 44px;
            background: var(--cs-accent-soft);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .cs-stat-icon .material-symbols-outlined {
            font-size: 22px;
            color: var(--cs-accent);
        }

        .cs-stat-card strong {
            display: block;
            font-size: 26px;
            font-weight: 700;
            font-family: 'Manrope', sans-serif;
            line-height: 1;
            margin-bottom: 3px;
        }

        .cs-stat-card small {
            font-size: 12px;
            color: var(--cs-muted);
        }

        /* ── Main layout ── */
        .cs-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }

        /* ── Sidebar / Filter rail ── */
        .cs-rail {
            background: var(--cs-surface);
            border: 1px solid var(--cs-border);
            border-radius: var(--cs-radius);
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: var(--cs-shadow);
            position: sticky;
            top: 24px;
        }

        .cs-rail-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .cs-rail-head .material-symbols-outlined {
            font-size: 18px;
            color: var(--cs-accent);
        }

        .cs-rail-head strong {
            font-size: 14px;
            font-weight: 700;
        }

        .cs-filter-group {
            margin-bottom: 16px;
        }

        .cs-filter-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--cs-muted);
            margin-bottom: 7px;
        }

        .cs-filter-group input,
        .cs-filter-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--cs-border);
            border-radius: 9px;
            font-size: 13px;
            font-family: inherit;
            background: rgba(255,255,255,0.8);
            outline: none;
            transition: border-color 0.15s;
            color: var(--cs-text);
        }

        .cs-filter-group input:focus,
        .cs-filter-group select:focus {
            border-color: var(--cs-accent);
            background: #fff;
        }

        .cs-filter-divider {
            height: 1px;
            background: var(--cs-border);
            margin: 18px 0;
        }

        /* ── Content area ── */
        .cs-content {}

        .cs-content-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .cs-content-head strong {
            font-family: 'Manrope', sans-serif;
            font-size: 17px;
            font-weight: 700;
        }

        .cs-content-head small {
            font-size: 11px;
            color: var(--cs-muted);
            display: block;
        }

        /* ── Snippet grid ── */
        .cs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
        }

        .cs-card {
            background: var(--cs-surface);
            border: 1px solid var(--cs-border);
            border-radius: var(--cs-radius);
            padding: 20px;
            box-shadow: var(--cs-shadow);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .cs-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--cs-shadow-md);
        }

        .cs-card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .cs-card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--cs-text);
            line-height: 1.3;
        }

        .cs-lang-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            background: var(--cs-accent-soft);
            border: 1px solid var(--cs-border);
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            color: var(--cs-accent-deep);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .cs-card-desc {
            font-size: 13px;
            color: var(--cs-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .cs-code-preview {
            background: var(--cs-text);
            color: #a7f3d0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 10px 12px;
            border-radius: 9px;
            max-height: 88px;
            overflow: hidden;
            margin-bottom: 12px;
            line-height: 1.55;
        }

        .cs-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
        }

        .cs-tag {
            padding: 2px 8px;
            background: rgba(13,148,136,0.08);
            border: 1px solid var(--cs-border);
            border-radius: 99px;
            font-size: 11px;
            color: var(--cs-accent-deep);
        }

        .cs-card-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .cs-card-date {
            font-size: 11px;
            color: var(--cs-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cs-card-date .material-symbols-outlined {
            font-size: 13px;
        }

        .cs-card-actions {
            display: flex;
            gap: 6px;
        }

        /* ── Empty state ── */
        .cs-empty {
            text-align: center;
            padding: 72px 24px;
            background: var(--cs-surface);
            border: 1px dashed var(--cs-border);
            border-radius: var(--cs-radius);
            backdrop-filter: blur(8px);
        }

        .cs-empty .material-symbols-outlined {
            font-size: 48px;
            color: var(--cs-accent);
            display: block;
            margin-bottom: 16px;
        }

        .cs-empty h3 {
            font-family: 'Manrope', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .cs-empty p {
            font-size: 14px;
            color: var(--cs-muted);
            margin-bottom: 20px;
        }

        /* ── Modal ── */
        .cs-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 41, 38, 0.55);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .cs-modal.is-open {
            display: flex;
        }

        .cs-modal-box {
            background: #fff;
            border-radius: var(--cs-radius);
            box-shadow: var(--cs-shadow-md);
            max-width: 820px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 36px;
        }

        .cs-modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .cs-modal-head h2 {
            font-family: 'Manrope', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--cs-text);
        }

        .cs-close {
            background: rgba(0,0,0,0.06);
            border: none;
            border-radius: 8px;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--cs-muted);
            transition: background 0.15s;
        }

        .cs-close:hover { background: rgba(0,0,0,0.11); }

        .cs-form-group {
            margin-bottom: 20px;
        }

        .cs-form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 7px;
            color: var(--cs-text);
        }

        .cs-form-group input,
        .cs-form-group textarea,
        .cs-form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid rgba(13,148,136,0.20);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            background: #fafafa;
        }

        .cs-form-group input:focus,
        .cs-form-group textarea:focus,
        .cs-form-group select:focus {
            border-color: var(--cs-accent);
            background: #fff;
        }

        .cs-form-group textarea {
            min-height: 200px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .cs-form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .cs-form-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .cs-layout { grid-template-columns: 240px minmax(0, 1fr); }
        }

        @media (max-width: 800px) {
            .cs-layout { grid-template-columns: 1fr; }
            .cs-rail { position: static; }
            .cs-stats-strip { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 560px) {
            .cs-shell { padding: 20px 16px 60px; }
            .cs-stats-strip { grid-template-columns: 1fr; }
            .cs-modal-box { padding: 24px 18px; }
            .cs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cs-shell">

    <!-- ── Topbar ── -->
    <header class="cs-topbar">
        <a class="cs-brand" href="/">
            <div class="cs-brand-mark">
                <span class="material-symbols-outlined" style="font-size:20px;color:#fff;">code</span>
            </div>
            <div class="cs-brand-copy">
                <strong>风起时域</strong>
                <small>新能源 AI 平台</small>
            </div>
        </a>
        <div class="cs-topbar-right">
            <button class="cs-btn cs-btn-primary" onclick="openCreateModal()">
                <span class="material-symbols-outlined" style="font-size:16px;">add</span>
                新建片段
            </button>
        </div>
    </header>

    <!-- ── Stats Strip ── -->
    <div class="cs-stats-strip" id="statsGrid">
        <div class="cs-stat-card">
            <div class="cs-stat-icon">
                <span class="material-symbols-outlined">integration_instructions</span>
            </div>
            <div>
                <strong id="stat-total">—</strong>
                <small>代码片段</small>
            </div>
        </div>
        <div class="cs-stat-card">
            <div class="cs-stat-icon">
                <span class="material-symbols-outlined">play_circle</span>
            </div>
            <div>
                <strong id="stat-exec">—</strong>
                <small>总执行次数</small>
            </div>
        </div>
        <div class="cs-stat-card">
            <div class="cs-stat-icon">
                <span class="material-symbols-outlined">language</span>
            </div>
            <div>
                <strong id="stat-langs">—</strong>
                <small>编程语言</small>
            </div>
        </div>
    </div>

    <!-- ── Main layout ── -->
    <div class="cs-layout">

        <!-- Sidebar filter rail -->
        <aside class="cs-rail">
            <div class="cs-rail-head">
                <span class="material-symbols-outlined">filter_list</span>
                <strong>筛选</strong>
            </div>

            <div class="cs-filter-group">
                <label>关键词搜索</label>
                <input type="text" id="searchInput" placeholder="搜索标题、描述或代码…">
            </div>

            <div class="cs-filter-group">
                <label>编程语言</label>
                <select id="languageFilter">
                    <option value="">全部语言</option>
                </select>
            </div>

            <div class="cs-filter-group">
                <label>标签</label>
                <input type="text" id="tagsFilter" placeholder="输入标签…">
            </div>

            <div class="cs-filter-divider"></div>

            <button class="cs-btn cs-btn-primary" style="width:100%;" onclick="applyFilters()">
                <span class="material-symbols-outlined" style="font-size:15px;">search</span>
                应用筛选
            </button>
        </aside>

        <!-- Content area -->
        <div class="cs-content">
            <div class="cs-content-head">
                <div>
                    <small>代码库</small>
                    <strong>代码片段管理</strong>
                </div>
            </div>
            <div id="snippetsContainer"></div>
        </div>

    </div>
</div>

<!-- ── 创建/编辑 Modal ── -->
<div class="cs-modal" id="snippetModal">
    <div class="cs-modal-box">
        <div class="cs-modal-head">
            <h2 id="modalTitle">新建代码片段</h2>
            <button class="cs-close" onclick="closeModal()">
                <span class="material-symbols-outlined" style="font-size:18px;">close</span>
            </button>
        </div>

        <form id="snippetForm">
            <input type="hidden" id="snippetId">

            <div class="cs-form-group">
                <label>标题 *</label>
                <input type="text" id="title" required>
            </div>

            <div class="cs-form-group">
                <label>描述</label>
                <input type="text" id="description">
            </div>

            <div class="cs-form-group">
                <label>编程语言 *</label>
                <select id="language" required></select>
            </div>

            <div class="cs-form-group">
                <label>代码 *</label>
                <textarea id="code" required></textarea>
            </div>

            <div class="cs-form-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="tags" placeholder="例如: 算法, 工具, 示例">
            </div>

            <div class="cs-form-group">
                <label class="cs-form-check">
                    <input type="checkbox" id="isPublic">
                    公开分享
                </label>
            </div>

            <div class="cs-form-row">
                <button type="button" class="cs-btn cs-btn-ghost" onclick="closeModal()">取消</button>
                <button type="submit" class="cs-btn cs-btn-primary">
                    <span class="material-symbols-outlined" style="font-size:15px;">save</span>
                    保存
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentSnippetId = null;
    let allLanguages = [];

    // 初始化
    async function init() {
        await loadLanguages();
        await loadStatistics();
        await loadSnippets();
    }

    // 加载支持的语言
    async function loadLanguages() {
        try {
            const response = await fetch('/api/snippets/languages');
            const data = await response.json();
            allLanguages = data.languages;

            const languageFilter = document.getElementById('languageFilter');
            const languageSelect = document.getElementById('language');

            allLanguages.forEach(lang => {
                const option1 = document.createElement('option');
                option1.value = lang.id;
                option1.textContent = `${lang.icon} ${lang.name}`;
                languageFilter.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = lang.id;
                option2.textContent = `${lang.icon} ${lang.name}`;
                languageSelect.appendChild(option2);
            });
        } catch (error) {
            console.error('加载语言列表失败:', error);
        }
    }

    // 加载统计信息
    async function loadStatistics() {
        try {
            const response = await fetch('/api/snippets/statistics');
            const stats = await response.json();

            document.getElementById('stat-total').textContent = stats.total_snippets;
            document.getElementById('stat-exec').textContent = stats.total_executions || 0;
            document.getElementById('stat-langs').textContent = stats.by_language.length;
        } catch (error) {
            console.error('加载统计信息失败:', error);
        }
    }

    // 加载代码片段列表
    async function loadSnippets(filters = {}) {
        try {
            const params = new URLSearchParams(filters);
            const response = await fetch(`/api/snippets?${params}`);
            const data = await response.json();
            renderSnippets(data.snippets);
        } catch (error) {
            console.error('加载代码片段失败:', error);
        }
    }

    // 渲染代码片段
    function renderSnippets(snippets) {
        const container = document.getElementById('snippetsContainer');

        if (snippets.length === 0) {
            container.innerHTML = `
                <div class="cs-empty">
                    <span class="material-symbols-outlined">integration_instructions</span>
                    <h3>暂无代码片段</h3>
                    <p>点击右上角"新建片段"按钮创建你的第一个代码片段</p>
                    <button class="cs-btn cs-btn-primary" onclick="openCreateModal()">
                        <span class="material-symbols-outlined" style="font-size:15px;">add</span>
                        新建片段
                    </button>
                </div>
            `;
            return;
        }

        const grid = document.createElement('div');
        grid.className = 'cs-grid';

        snippets.forEach(snippet => {
            const lang = allLanguages.find(l => l.id === snippet.language) || { icon: '📄', name: snippet.language };

            const card = document.createElement('div');
            card.className = 'cs-card';
            card.innerHTML = `
                <div class="cs-card-head">
                    <div class="cs-card-title">${escapeHtml(snippet.title)}</div>
                    <span class="cs-lang-badge">${lang.icon} ${lang.name}</span>
                </div>
                ${snippet.description ? `<div class="cs-card-desc">${escapeHtml(snippet.description)}</div>` : ''}
                <div class="cs-code-preview">${escapeHtml(snippet.code)}</div>
                ${snippet.tags && snippet.tags.length > 0 ? `
                    <div class="cs-tags">
                        ${snippet.tags.map(tag => `<span class="cs-tag">${escapeHtml(tag)}</span>`).join('')}
                    </div>
                ` : ''}
                <div class="cs-card-foot">
                    <div class="cs-card-date">
                        <span class="material-symbols-outlined">calendar_today</span>
                        ${new Date(snippet.created_at).toLocaleDateString()}
                    </div>
                    <div class="cs-card-actions">
                        <button class="cs-btn cs-btn-ghost cs-btn-sm" onclick="editSnippet(${snippet.id})">
                            <span class="material-symbols-outlined" style="font-size:13px;">edit</span>
                            编辑
                        </button>
                        <button class="cs-btn cs-btn-danger cs-btn-sm" onclick="deleteSnippet(${snippet.id})">
                            <span class="material-symbols-outlined" style="font-size:13px;">delete</span>
                            删除
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        container.innerHTML = '';
        container.appendChild(grid);
    }

    // 应用筛选
    async function applyFilters() {
        const filters = {};

        const language = document.getElementById('languageFilter').value;
        if (language) filters.language = language;

        const tags = document.getElementById('tagsFilter').value;
        if (tags) filters.tags = tags.split(',').map(t => t.trim());

        await loadSnippets(filters);
    }

    // 搜索
    document.getElementById('searchInput').addEventListener('input', async (e) => {
        const keyword = e.target.value.trim();
        if (keyword.length >= 2) {
            try {
                const response = await fetch(`/api/snippets/search?q=${encodeURIComponent(keyword)}`);
                const data = await response.json();
                renderSnippets(data.snippets);
            } catch (error) {
                console.error('搜索失败:', error);
            }
        } else if (keyword.length === 0) {
            loadSnippets();
        }
    });

    // 打开创建模态框
    function openCreateModal() {
        currentSnippetId = null;
        document.getElementById('modalTitle').textContent = '新建代码片段';
        document.getElementById('snippetForm').reset();
        document.getElementById('snippetModal').classList.add('is-open');
    }

    // 编辑代码片段
    async function editSnippet(id) {
        try {
            const response = await fetch(`/api/snippets/${id}`);
            const snippet = await response.json();

            currentSnippetId = id;
            document.getElementById('modalTitle').textContent = '编辑代码片段';
            document.getElementById('title').value = snippet.title;
            document.getElementById('description').value = snippet.description || '';
            document.getElementById('language').value = snippet.language;
            document.getElementById('code').value = snippet.code;
            document.getElementById('tags').value = snippet.tags ? snippet.tags.join(', ') : '';
            document.getElementById('isPublic').checked = snippet.is_public;

            document.getElementById('snippetModal').classList.add('is-open');
        } catch (error) {
            console.error('加载代码片段失败:', error);
            alert('加载代码片段失败');
        }
    }

    // 删除代码片段
    async function deleteSnippet(id) {
        if (!confirm('确定要删除这个代码片段吗？')) return;

        try {
            const response = await fetch(`/api/snippets/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                await loadSnippets();
                await loadStatistics();
            } else {
                alert('删除失败');
            }
        } catch (error) {
            console.error('删除失败:', error);
            alert('删除失败');
        }
    }

    // 关闭模态框
    function closeModal() {
        document.getElementById('snippetModal').classList.remove('is-open');
    }

    // 提交表单
    document.getElementById('snippetForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            language: document.getElementById('language').value,
            code: document.getElementById('code').value,
            tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
            is_public: document.getElementById('isPublic').checked
        };

        try {
            const url = currentSnippetId
                ? `/api/snippets/${currentSnippetId}`
                : '/api/snippets';

            const method = currentSnippetId ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeModal();
                await loadSnippets();
                await loadStatistics();
            } else {
                const error = await response.json();
                alert(error.error || '保存失败');
            }
        } catch (error) {
            console.error('保存失败:', error);
            alert('保存失败');
        }
    });

    // HTML 转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 初始化
    init();
</script>
</body>
</html>
