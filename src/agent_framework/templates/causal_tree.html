        // ========== 历史记录功能 ==========
        function saveToHistory() {
            if (!currentTree) return;

            const state = {
                tree: JSON.parse(JSON.stringify(currentTree)),
                positions: new Map(nodePositions),
                sizes: new Map(nodeSizes),
                colors: new Map(nodeColors)
            };

            // 删除当前位置之后的历史
            history = history.slice(0, historyIndex + 1);

            // 添加新状态
            history.push(state);

            // 限制历史记录数量
            if (history.length > MAX_HISTORY) {
                history.shift();
            } else {
                historyIndex++;
            }

            updateHistoryButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                restoreFromHistory();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                restoreFromHistory();
            }
        }

        function restoreFromHistory() {
            if (historyIndex < 0 || historyIndex >= history.length) return;

            const state = history[historyIndex];
            currentTree = JSON.parse(JSON.stringify(state.tree));
            nodePositions = new Map(state.positions);
            nodeSizes = new Map(state.sizes);
            nodeColors = new Map(state.colors);

            renderTree(currentTree);
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            const undoBtn = document.getElementById('undo-btn');
            const redoBtn = document.getElementById('redo-btn');

            if (undoBtn) {
                undoBtn.disabled = historyIndex <= 0;
                undoBtn.style.opacity = historyIndex <= 0 ? '0.5' : '1';
            }

            if (redoBtn) {
                redoBtn.disabled = historyIndex >= history.length - 1;
                redoBtn.style.opacity = historyIndex >= history.length - 1 ? '0.5' : '1';
            }
        }

        // ========== 搜索功能 ==========
        function searchNodes(keyword) {
            const resultsDiv = document.getElementById('search-results');

            if (!keyword.trim()) {
                resultsDiv.innerHTML = '';
                return;
            }

            const results = [];

            function search(node) {
                if (node.content && node.content.toLowerCase().includes(keyword.toLowerCase())) {
                    results.push(node);
                }
                if (node.relation && node.relation.toLowerCase().includes(keyword.toLowerCase())) {
                    results.push(node);
                }
                if (node.children) {
                    node.children.forEach(child => search(child));
                }
            }

            if (currentTree) {
                search(currentTree);
            }

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 8px; color: #95a5a6;">未找到匹配的节点</div>';
            } else {
                resultsDiv.innerHTML = results.map(node =>
                    `<div style="padding: 6px; cursor: pointer; border-bottom: 1px solid #ecf0f1; transition: background 0.2s;"
                          onmouseover="this.style.background='#f8f9fa'"
                          onmouseout="this.style.background='transparent'"
                          onclick="highlightNode('${node.id}')">
                        ${node.content || '未命名节点'}
                    </div>`
                ).join('');
            }
        }

        function highlightNode(nodeId) {
            // 清除之前的选择
            selectedNodes.clear();
            document.querySelectorAll('.tree-node').forEach(el => {
                el.style.outline = 'none';
                el.style.boxShadow = '';

            // 高亮目标节点
            const element = document.querySelector(`[data-node-id="${nodeId}"]`);
            if (element) {
                selectedNodes.add(nodeId);
                element.style.outline = '3px solid #3498db';
                element.style.boxShadow = '0 0 15px rgba(52, 152, 219, 0.5)';

                // 移动画布使节点居中

                    const container = document.getElementById('result-container');
                    const rect = container.getBoundingClientRect();
                    canvasOffset.x = rect.width / 2 - pos.x * canvasScale;
                    canvasOffset.y = rect.height / 2 - pos.y * canvasScale;
                    updateCanvasTransform();
                }
            }
        }

        function toggleNodeSelection(nodeId) {
            const element = document.querySelector(`[data-node-id="${nodeId}"]`);
            if (!element) return;

            if (selectedNodes.has(nodeId)) {
                // 取消选中
                selectedNodes.delete(nodeId);
                element.style.outline = 'none';
                element.style.boxShadow = '';
            } else {
                // 选中
                selectedNodes.add(nodeId);
                element.style.outline = '3px solid #3498db';
                element.style.boxShadow = '0 0 15px rgba(52, 152, 219, 0.5)';
            }
        }

        function clearSelection() {
            selectedNodes.clear();
            document.querySelectorAll('.tree-node').forEach(el => {
                el.style.outline = 'none';
                el.style.boxShadow = '';
            });
        }

        // ========== 批量编辑功能 ==========
        async function batchEditConfidence() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            const value = await showCustomPrompt('请输入置信度 (0-1):', '0.8');
            if (value === null) return;

            const confidence = parseFloat(value);
            if (isNaN(confidence) || confidence < 0 || confidence > 1) {
                await showCustomAlert('请输入0到1之间的数值');
                return;
            }

            selectedNodes.forEach(nodeId => {
                function updateConfidence(tree) {
                    if (tree.id === nodeId) {
                        tree.confidence = confidence;
                        return true;
                    }
                    if (tree.children) {
                        for (let child of tree.children) {
                            if (updateConfidence(child)) return true;
                        }
                    }
                    return false;
                }
                updateConfidence(currentTree);
            });

            renderTree(currentTree);
            saveToHistory();
        }

        async function batchEditRelation() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            const value = await showCustomPrompt('请输入关系类型:', '导致');
            if (value === null || !value.trim()) return;

            selectedNodes.forEach(nodeId => {
                function updateRelation(tree) {
                    if (tree.id === nodeId) {
                        tree.relation = value.trim();
                        return true;
                    }
                    if (tree.children) {
                        for (let child of tree.children) {
                            if (updateRelation(child)) return true;
                        }
                    }
                    return false;
                }
                updateRelation(currentTree);
            });

            renderTree(currentTree);
            saveToHistory();
        }

        // ========== 布局功能增强 ==========
        async function distributeVertical() {
            if (selectedNodes.size < 3) {
                await showCustomAlert('请至少选择三个节点');
                return;
            }

            const positions = Array.from(selectedNodes).map(id => ({
                id,
                pos: nodePositions.get(id)
            })).sort((a, b) => a.pos.y - b.pos.y);

            const minY = positions[0].pos.y;
            const maxY = positions[positions.length - 1].pos.y;
            const spacing = (maxY - minY) / (positions.length - 1);

            positions.forEach(({ id }, index) => {
                const pos = nodePositions.get(id);
                const newY = minY + spacing * index;
                nodePositions.set(id, { x: pos.x, y: newY });
                const element = document.querySelector(`[data-node-id="${id}"]`);
                if (element) {
                    element.style.top = newY + 'px';
                }
            });

            drawConnections();
            saveToHistory();
        }

        function compactLayout() {
            if (!currentTree) return;

            // 紧凑布局：减小节点间距
            nodePositions.clear();
            initializeNodePositionsCompact(currentTree);
            renderTree(currentTree);
            saveToHistory();
        }

        function initializeNodePositionsCompact(tree, x = 600, y = 100, level = 0) {
            const nodeId = tree.id;
            nodePositions.set(nodeId, { x, y });

            if (!nodeSizes.has(nodeId)) {
                nodeSizes.set(nodeId, { width: 200, height: 'auto' });
            }

            if (tree.children && tree.children.length > 0) {
                const childY = y + 150; // 减小垂直间距
                const totalWidth = tree.children.length * 220; // 减小水平间距
                const startX = x - totalWidth / 2 + 110;

                tree.children.forEach((child, index) => {
                    const childX = startX + index * 220;
                    initializeNodePositionsCompact(child, childX, childY, level + 1);
                });
            }
        }

        // ========== SVG导出功能 ==========
        async function exportAsSVG() {
            if (!currentTree) {
                await showCustomAlert('没有可导出的数据');
                return;
            }

            const svg = document.getElementById('connections-svg');
            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'causal-tree-' + Date.now() + '.svg';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ========== 文本编辑功能 ==========
        async function changeFontSize() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            const fontSize = document.getElementById('font-size-select').value;
            selectedNodes.forEach(nodeId => {
                const element = document.querySelector(`[data-node-id="${nodeId}"] .node-content`);
                if (element) {
                    element.style.fontSize = fontSize + 'px';
                }
            });
        }

        async function toggleBold() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            selectedNodes.forEach(nodeId => {
                const element = document.querySelector(`[data-node-id="${nodeId}"] .node-content`);
                if (element) {
                    const currentWeight = window.getComputedStyle(element).fontWeight;
                    element.style.fontWeight = currentWeight === '700' || currentWeight === 'bold' ? 'normal' : 'bold';
                }
            });
        }

        async function toggleItalic() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            selectedNodes.forEach(nodeId => {
                const element = document.querySelector(`[data-node-id="${nodeId}"] .node-content`);
                if (element) {
                    const currentStyle = window.getComputedStyle(element).fontStyle;
                    element.style.fontStyle = currentStyle === 'italic' ? 'normal' : 'italic';
                }
            });
        }

        async function toggleUnderline() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            selectedNodes.forEach(nodeId => {
                const element = document.querySelector(`[data-node-id="${nodeId}"] .node-content`);
                if (element) {
                    const currentDecoration = window.getComputedStyle(element).textDecoration;
                    element.style.textDecoration = currentDecoration.includes('underline') ? 'none' : 'underline';
                }
            });
        }

        // ========== 节点标签功能 ==========
        let nodeTags = new Map(); // 存储节点标签

        async function addTag() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            const tagInput = document.getElementById('tag-input');
            const tagText = tagInput.value.trim();
            if (!tagText) {
                await showCustomAlert('请输入标签内容');
                return;
            }

            selectedNodes.forEach(nodeId => {
                if (!nodeTags.has(nodeId)) {
                    nodeTags.set(nodeId, []);
                }
                const tags = nodeTags.get(nodeId);
                if (!tags.includes(tagText)) {
                    tags.push(tagText);
                    updateNodeTags(nodeId);
                }
            });

            tagInput.value = '';
        }

        async function removeTag() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            const tagInput = document.getElementById('tag-input');
            const tagText = tagInput.value.trim();
            if (!tagText) {
                await showCustomAlert('请输入要移除的标签内容');
                return;
            }

            selectedNodes.forEach(nodeId => {
                if (nodeTags.has(nodeId)) {
                    const tags = nodeTags.get(nodeId);
                    const index = tags.indexOf(tagText);
                    if (index > -1) {
                        tags.splice(index, 1);
                        updateNodeTags(nodeId);
                    }
                }
            });

            tagInput.value = '';
        }

        async function addQuickTag(tagText) {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            selectedNodes.forEach(nodeId => {
                if (!nodeTags.has(nodeId)) {
                    nodeTags.set(nodeId, []);
                }
                const tags = nodeTags.get(nodeId);
                if (!tags.includes(tagText)) {
                    tags.push(tagText);
                    updateNodeTags(nodeId);
                }
            });
        }

        function updateNodeTags(nodeId) {
            const element = document.querySelector(`[data-node-id="${nodeId}"]`);
            if (!element) return;

            // 移除旧标签
            const oldTags = element.querySelectorAll('.node-tag');
            oldTags.forEach(tag => tag.remove());

            // 添加新标签
            const tags = nodeTags.get(nodeId) || [];
            if (tags.length > 0) {
                let tagsContainer = element.querySelector('.node-tags-container');
                if (!tagsContainer) {
                    tagsContainer = document.createElement('div');
                    tagsContainer.className = 'node-tags-container';
                    tagsContainer.style.marginTop = '8px';
                    element.appendChild(tagsContainer);
                }

                tags.forEach(tagText => {
                    const tagElement = document.createElement('span');
                    tagElement.className = 'node-tag';

                    // 根据标签文本设置样式
                    if (tagText === '重要') tagElement.classList.add('important');
                    else if (tagText === '已验证') tagElement.classList.add('verified');
                    else if (tagText === '待确认') tagElement.classList.add('pending');
                    else if (tagText === '假设') tagElement.classList.add('hypothesis');

                    tagElement.textContent = tagText;
                    tagsContainer.appendChild(tagElement);
                });
            }
        }

        // ========== 连接线工具 ==========
        let lineStyle = 'solid';
        let lineWidth = 2;
        let showConnectionLabels = true;

        function changeLineStyle() {
            lineStyle = document.getElementById('line-style-select').value;
            drawConnections();
        }

        function changeLineWidth() {
            lineWidth = parseInt(document.getElementById('line-width-select').value);
            drawConnections();
        }

        function toggleConnectionLabels() {
            showConnectionLabels = !showConnectionLabels;
            drawConnections();
        }

        // ========== 节点分组功能 ==========
        let nodeGroups = new Map(); // 存储分组信息
        let groupIdCounter = 0;

        async function createGroup() {
            if (selectedNodes.size < 2) {
                await showCustomAlert('请至少选择两个节点来创建分组');
                return;
            }

            const groupId = 'group-' + (++groupIdCounter);
            const groupName = await showCustomPrompt('请输入分组名称:', '新分组');
            if (!groupName) return;

            // 计算分组边界
            const nodes = Array.from(selectedNodes).map(id => {
                const element = document.querySelector(`[data-node-id="${id}"]`);
                const pos = nodePositions.get(id);
                return {
                    id,
                    x: pos.x,
                    y: pos.y,
                    width: element.offsetWidth,
                    height: element.offsetHeight
                };
            });

            const minX = Math.min(...nodes.map(n => n.x)) - 20;
            const minY = Math.min(...nodes.map(n => n.y)) - 30;
            const maxX = Math.max(...nodes.map(n => n.x + n.width)) + 20;
            const maxY = Math.max(...nodes.map(n => n.y + n.height)) + 20;

            nodeGroups.set(groupId, {
                name: groupName,
                nodes: Array.from(selectedNodes),
                bounds: { x: minX, y: minY, width: maxX - minX, height: maxY - minY },
                collapsed: false
            });

            renderGroups();
        }

        async function ungroupNodes() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            // 找到包含选中节点的分组并删除
            for (const [groupId, group] of nodeGroups.entries()) {
                const hasSelectedNode = group.nodes.some(nodeId => selectedNodes.has(nodeId));
                if (hasSelectedNode) {
                    nodeGroups.delete(groupId);
                }
            }

            renderGroups();
        }

        async function collapseGroup() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            for (const [groupId, group] of nodeGroups.entries()) {
                const hasSelectedNode = group.nodes.some(nodeId => selectedNodes.has(nodeId));
                if (hasSelectedNode) {
                    group.collapsed = true;
                    // 隐藏分组内的节点
                    group.nodes.forEach(nodeId => {
                        const element = document.querySelector(`[data-node-id="${nodeId}"]`);
                        if (element) element.style.display = 'none';
                    });
                }
            }

            renderGroups();
        }

        async function expandGroup() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择节点');
                return;
            }

            for (const [groupId, group] of nodeGroups.entries()) {
                const hasSelectedNode = group.nodes.some(nodeId => selectedNodes.has(nodeId));
                if (hasSelectedNode) {
                    group.collapsed = false;
                    // 显示分组内的节点
                    group.nodes.forEach(nodeId => {
                        const element = document.querySelector(`[data-node-id="${nodeId}"]`);
                        if (element) element.style.display = 'block';
                    });
                }
            }

            renderGroups();
        }

        function renderGroups() {
            // 移除旧的分组元素
            document.querySelectorAll('.node-group').forEach(el => el.remove());

            const treeContent = document.getElementById('tree-content');

            // 渲染所有分组
            nodeGroups.forEach((group, groupId) => {
                const groupElement = document.createElement('div');
                groupElement.className = 'node-group';
                if (group.collapsed) groupElement.classList.add('collapsed');

                groupElement.style.left = group.bounds.x + 'px';
                groupElement.style.top = group.bounds.y + 'px';
                groupElement.style.width = group.bounds.width + 'px';
                groupElement.style.height = group.bounds.height + 'px';

                const label = document.createElement('div');
                label.className = 'group-label';
                label.textContent = group.name;
                groupElement.appendChild(label);

                treeContent.appendChild(groupElement);
            });
        }

        // ========== 快捷操作功能 ==========
        async function quickHighlight() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择要高亮的节点');
                return;
            }

            selectedNodes.forEach(nodeId => {
                const element = document.querySelector(`[data-node-id="${nodeId}"]`);
                if (element) {
                    element.style.boxShadow = '0 0 20px rgba(241, 196, 15, 0.8)';
                    element.style.borderColor = '#f1c40f';
                    element.style.borderWidth = '3px';
                }
            });
        }

        async function quickHideUnselected() {
            if (selectedNodes.size === 0) {
                await showCustomAlert('请先选择要保留显示的节点');
                return;
            }

            document.querySelectorAll('.tree-node').forEach(element => {
                const nodeId = element.getAttribute('data-node-id');
                if (!selectedNodes.has(nodeId)) {
                    element.style.opacity = '0.2';
                    element.style.pointerEvents = 'none';
                }
            });
        }

        function quickShowAll() {
            document.querySelectorAll('.tree-node').forEach(element => {
                element.style.opacity = '1';
                element.style.pointerEvents = 'auto';
                element.style.display = 'block';
            });
        }

        async function quickResetStyles() {
            if (!await showCustomConfirm('确定要重置所有节点样式吗？这将清除所有自定义颜色、字体和标签。')) {
                return;
            }

            // 清除所有自定义样式
            document.querySelectorAll('.tree-node').forEach(element => {
                const nodeId = element.getAttribute('data-node-id');

                // 重置基本样式
                element.style.boxShadow = '';
                element.style.borderColor = '';
                element.style.borderWidth = '';
                element.style.opacity = '1';
                element.style.pointerEvents = 'auto';
                element.style.display = 'block';

                // 重置文本样式
                const content = element.querySelector('.node-content');
                if (content) {
                    content.style.fontSize = '';
                    content.style.fontWeight = '';
                    content.style.fontStyle = '';
                    content.style.textDecoration = '';
                }

                // 移除标签
                const tagsContainer = element.querySelector('.node-tags-container');
                if (tagsContainer) {
                    tagsContainer.remove();
                }
            });

            // 清除数据
            nodeColors.clear();
            nodeTags.clear();
            nodeGroups.clear();

            // 重置连接线样式
            lineStyle = 'solid';
            lineWidth = 2;
            showConnectionLabels = true;
            document.getElementById('line-style-select').value = 'solid';
            document.getElementById('line-width-select').value = '2';

            // 重新渲染
            renderGroups();
            drawConnections();
        }

        // ========== 帮助功能 ==========
        function showKeyboardShortcuts() {
            const shortcuts = `
                <div style="max-height: 400px; overflow-y: auto; padding: 10px;">
                    <h3 style="margin-top: 0; color: #2c3e50;">键盘快捷键</h3>

                    <div style="margin-bottom: 15px;">
                        <h4 style="color: #3498db; margin-bottom: 8px;">基本操作</h4>
                        <div style="font-size: 13px; line-height: 1.8;">
                            <div><kbd>Ctrl+Z</kbd> - 撤销</div>
                            <div><kbd>Ctrl+Y</kbd> - 重做</div>
                            <div><kbd>Ctrl+A</kbd> - 全选节点</div>
                            <div><kbd>Delete</kbd> - 删除选中节点</div>
                            <div><kbd>Esc</kbd> - 清除选择</div>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <h4 style="color: #3498db; margin-bottom: 8px;">文本编辑</h4>
                        <div style="font-size: 13px; line-height: 1.8;">
                            <div><kbd>Ctrl+B</kbd> - 粗体</div>
                            <div><kbd>Ctrl+I</kbd> - 斜体</div>
                            <div><kbd>Ctrl+U</kbd> - 下划线</div>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <h4 style="color: #3498db; margin-bottom: 8px;">高级操作</h4>
                        <div style="font-size: 13px; line-height: 1.8;">
                            <div><kbd>Ctrl+G</kbd> - 创建分组</div>
                            <div><kbd>Ctrl+H</kbd> - 高亮选中节点</div>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <h4 style="color: #3498db; margin-bottom: 8px;">鼠标操作</h4>
                        <div style="font-size: 13px; line-height: 1.8;">
                            <div>点击节点 - 选中/取消选中节点</div>
                            <div>拖动节点 - 移动节点位置</div>
                            <div>拖动画布空白处 - 平移画布</div>
                            <div>滚轮 - 缩放画布</div>
                            <div>双击节点内容 - 编辑文本</div>
                        </div>
                    </div>

                    <div style="background: #ecf0f1; padding: 10px; border-radius: 6px; margin-top: 15px;">
                        <div style="font-size: 12px; color: #7f8c8d;">
                            💡 提示：直接点击节点即可选中，支持多选节点批量操作，按Del键删除选中的节点
                        </div>
                    </div>
                </div>
            `;

            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(255, 255, 255, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            `;

            const content = document.createElement('div');
            content.style.cssText = `
                background: white;
                border-radius: 12px;
                padding: 20px;
                max-width: 500px;
                width: 90%;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            `;
            content.innerHTML = shortcuts;

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '关闭';
            closeBtn.style.cssText = `
                width: 100%;
                padding: 10px;
                background: linear-gradient(135deg, #3498db, #2980b9);
                color: white;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                margin-top: 15px;
            `;
            closeBtn.onclick = () => modal.remove();

            content.appendChild(closeBtn);
            modal.appendChild(content);
            document.body.appendChild(modal);

            // 点击背景关闭
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        // ========== 键盘快捷键 ==========
        document.addEventListener('keydown', function(e) {
            // Ctrl+Z: 撤销
            if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
                e.preventDefault();
                undo();
            }
            // Ctrl+Y 或 Ctrl+Shift+Z: 重做
            else if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'z')) {
                e.preventDefault();
                redo();
            }
            // Ctrl+A: 全选
            else if (e.ctrlKey && e.key === 'a') {
                e.preventDefault();
                selectAllNodes();
            }
            // Delete: 删除选中节点
            else if (e.key === 'Delete' && selectedNodes.size > 0) {
                e.preventDefault();
                deleteSelectedNodes();
            }
            // Escape: 清除选择
            else if (e.key === 'Escape') {
                clearSelection();
            }
            // Ctrl+B: 粗体
            else if (e.ctrlKey && e.key === 'b') {
                e.preventDefault();
                toggleBold();
            }
            // Ctrl+I: 斜体
            else if (e.ctrlKey && e.key === 'i') {
                e.preventDefault();
                toggleItalic();
            }
            // Ctrl+U: 下划线
            else if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                toggleUnderline();
            }
            // Ctrl+G: 创建分组
            else if (e.ctrlKey && e.key === 'g') {
                e.preventDefault();
                createGroup();
            }
            // Ctrl+H: 高亮选中节点
            else if (e.ctrlKey && e.key === 'h') {
                e.preventDefault();
                quickHighlight();
            }
        });

        // 修改原有函数，添加历史记录保存
        const originalAnalyzeCausalTree = analyzeCausalTree;
        analyzeCausalTree = async function() {
            await originalAnalyzeCausalTree();
            if (currentTree) {
                saveToHistory();
            }
        };

    </script>

    <!-- 服务端安全注入的演示数据：type=application/json 不会被当 JS 执行，完全规避特殊字符问题 -->
    <script type="application/json" id="preload-data">{{ preload_json | safe }}</script>
    <script type="application/json" id="preload-id">"{{ selected_demo_id | safe }}"</script>
