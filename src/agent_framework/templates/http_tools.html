<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP 请求工具 - Agent Framework</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base-theme.css">
    <style>
        :root {
            --theme-accent: #1363df;
            --theme-accent-deep: #0f4eb3;
            --theme-accent-soft: rgba(19, 99, 223, 0.10);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--theme-accent-deep), var(--theme-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }

        .request-panel {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 24px;
        }

        .method-url-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .method-select {
            width: 120px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-weight: 600;
            background: white;
            cursor: pointer;
        }

        .url-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-send {
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-deep));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: var(--theme-accent);
            border-bottom-color: var(--theme-accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .headers-list {
            display: grid;
            gap: 12px;
        }

        .header-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-remove {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #fee2e2;
            background: white;
            color: #dc2626;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-add {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 12px;
        }

        .body-editor {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }

        .response-panel {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 24px;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .response-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-error {
            background: #fee2e2;
            color: #dc2626;
        }

        .response-meta {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .meta-label {
            color: #64748b;
        }

        .meta-value {
            font-weight: 600;
            color: #0f172a;
        }

        .response-body {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .history-panel {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 20px;
        }

        .history-title {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .history-list {
            display: grid;
            gap: 8px;
        }

        .history-item {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: var(--theme-accent);
            background: var(--theme-accent-soft);
        }

        .history-method {
            display: inline-block;
            padding: 2px 8px;
            background: var(--theme-accent-soft);
            color: var(--theme-accent);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-right: 8px;
        }

        .history-url {
            font-size: 13px;
            color: #475569;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🌐 HTTP 请求工具</h1>
                <p>测试和调试 HTTP API，支持各种请求方法和参数配置</p>
            </div>
        </div>

        <div class="main-content">
            <div>
                <div class="request-panel">
                    <h3 style="margin-bottom: 16px;">请求配置</h3>

                    <div class="method-url-row">
                        <select class="method-select" id="method">
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="DELETE">DELETE</option>
                            <option value="PATCH">PATCH</option>
                            <option value="HEAD">HEAD</option>
                            <option value="OPTIONS">OPTIONS</option>
                        </select>
                        <input type="text" class="url-input" id="url" placeholder="https://api.example.com/endpoint" value="https://jsonplaceholder.typicode.com/posts/1">
                        <button class="btn-send" onclick="sendRequest()">
                            <i class="fas fa-paper-plane"></i> 发送
                        </button>
                    </div>

                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('headers')">Headers</button>
                        <button class="tab" onclick="switchTab('params')">Query Params</button>
                        <button class="tab" onclick="switchTab('body')">Body</button>
                        <button class="tab" onclick="switchTab('auth')">Auth</button>
                    </div>

                    <div id="headers-tab" class="tab-content active">
                        <div class="headers-list" id="headersList">
                            <div class="header-row">
                                <input type="text" placeholder="Key" value="Content-Type">
                                <input type="text" placeholder="Value" value="application/json">
                                <button class="btn-remove" onclick="this.parentElement.remove()">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                        <button class="btn-add" onclick="addHeader()">
                            <i class="fas fa-plus"></i> 添加 Header
                        </button>
                    </div>

                    <div id="params-tab" class="tab-content">
                        <div class="headers-list" id="paramsList">
                            <div class="header-row">
                                <input type="text" placeholder="Key">
                                <input type="text" placeholder="Value">
                                <button class="btn-remove" onclick="this.parentElement.remove()">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                        <button class="btn-add" onclick="addParam()">
                            <i class="fas fa-plus"></i> 添加参数
                        </button>
                    </div>

                    <div id="body-tab" class="tab-content">
                        <textarea class="body-editor" id="requestBody" placeholder='{"key": "value"}'></textarea>
                    </div>

                    <div id="auth-tab" class="tab-content">
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 600;">认证类型</label>
                            <select class="method-select" style="width: 100%;">
                                <option>No Auth</option>
                                <option>Bearer Token</option>
                                <option>Basic Auth</option>
                                <option>API Key</option>
                            </select>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Token</label>
                            <input type="text" class="url-input" placeholder="输入认证令牌">
                        </div>
                    </div>
                </div>

                <div class="response-panel" style="margin-top: 20px;">
                    <div class="response-header">
                        <div class="response-title">响应结果</div>
                        <span class="status-badge status-success" id="statusBadge" style="display: none;">200 OK</span>
                    </div>

                    <div class="response-meta" id="responseMeta" style="display: none;">
                        <div class="meta-row">
                            <span class="meta-label">状态码</span>
                            <span class="meta-value" id="statusCode">-</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">响应时间</span>
                            <span class="meta-value" id="responseTime">-</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">响应大小</span>
                            <span class="meta-value" id="responseSize">-</span>
                        </div>
                    </div>

                    <div class="response-body" id="responseBody">
                        等待发送请求...
                    </div>
                </div>
            </div>

            <div class="history-panel">
                <div class="history-title">请求历史</div>
                <div class="history-list" id="historyList">
                    <div class="history-item" onclick="loadHistory(0)">
                        <div>
                            <span class="history-method">GET</span>
                            <span style="font-weight: 600; font-size: 13px;">示例请求</span>
                        </div>
                        <div class="history-url">https://jsonplaceholder.typicode.com/posts/1</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let requestHistory = [];

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        function addHeader() {
            const headersList = document.getElementById('headersList');
            const row = document.createElement('div');
            row.className = 'header-row';
            row.innerHTML = `
                <input type="text" placeholder="Key">
                <input type="text" placeholder="Value">
                <button class="btn-remove" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            headersList.appendChild(row);
        }

        function addParam() {
            const paramsList = document.getElementById('paramsList');
            const row = document.createElement('div');
            row.className = 'header-row';
            row.innerHTML = `
                <input type="text" placeholder="Key">
                <input type="text" placeholder="Value">
                <button class="btn-remove" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            paramsList.appendChild(row);
        }

        async function sendRequest() {
            const method = document.getElementById('method').value;
            const url = document.getElementById('url').value;
            const body = document.getElementById('requestBody').value;

            // 收集 headers
            const headers = {};
            document.querySelectorAll('#headersList .header-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value && inputs[1].value) {
                    headers[inputs[0].value] = inputs[1].value;
                }
            });

            // 收集 query params
            const params = {};
            document.querySelectorAll('#paramsList .header-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs[0].value && inputs[1].value) {
                    params[inputs[0].value] = inputs[1].value;
                }
            });

            const startTime = Date.now();

            try {
                // 构建完整 URL
                let fullUrl = url;
                const queryString = new URLSearchParams(params).toString();
                if (queryString) {
                    fullUrl += (url.includes('?') ? '&' : '?') + queryString;
                }

                const options = {
                    method: method,
                    headers: headers
                };

                if (body && ['POST', 'PUT', 'PATCH'].includes(method)) {
                    options.body = body;
                }

                const response = await fetch('/api/http/proxy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: fullUrl,
                        method: method,
                        headers: headers,
                        body: body
                    })
                });

                const endTime = Date.now();
                const data = await response.json();

                // 显示响应
                document.getElementById('statusBadge').style.display = 'block';
                document.getElementById('statusBadge').textContent = `${data.status || response.status} ${data.statusText || 'OK'}`;
                document.getElementById('statusBadge').className = `status-badge ${response.ok ? 'status-success' : 'status-error'}`;

                document.getElementById('responseMeta').style.display = 'block';
                document.getElementById('statusCode').textContent = data.status || response.status;
                document.getElementById('responseTime').textContent = `${endTime - startTime} ms`;
                document.getElementById('responseSize').textContent = `${JSON.stringify(data.data || data).length} bytes`;

                document.getElementById('responseBody').textContent = JSON.stringify(data.data || data, null, 2);

                // 添加到历史
                addToHistory(method, url, response.ok);

            } catch (error) {
                document.getElementById('statusBadge').style.display = 'block';
                document.getElementById('statusBadge').textContent = 'ERROR';
                document.getElementById('statusBadge').className = 'status-badge status-error';
                document.getElementById('responseBody').textContent = `Error: ${error.message}`;
            }
        }

        function addToHistory(method, url, success) {
            requestHistory.unshift({ method, url, success, time: new Date() });
            if (requestHistory.length > 10) requestHistory.pop();

            const historyList = document.getElementById('historyList');
            historyList.innerHTML = requestHistory.map((item, index) => `
                <div class="history-item" onclick="loadHistory(${index})">
                    <div>
                        <span class="history-method">${item.method}</span>
                        <span style="font-weight: 600; font-size: 13px;">${item.success ? '✓' : '✗'} ${item.time.toLocaleTimeString()}</span>
                    </div>
                    <div class="history-url">${item.url}</div>
                </div>
            `).join('');
        }

        function loadHistory(index) {
            const item = requestHistory[index];
            document.getElementById('method').value = item.method;
            document.getElementById('url').value = item.url;
        }
    </script>
</body>
</html>
