<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统状态</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: rgba(255, 255, 255, 0.94);
            --ink: #10233f;
            --muted: #5f728c;
            --line: #dbe4f0;
            --accent: #1363df;
            --accent-soft: rgba(19, 99, 223, 0.1);
            --warn: #2563eb;
            --error: #dc2626;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            color: var(--ink);
            font-family: "Inter", "Segoe UI", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(19, 99, 223, 0.10), transparent 28%),
                radial-gradient(circle at top right, rgba(96, 165, 250, 0.08), transparent 24%),
                linear-gradient(180deg, #f9fbff 0%, #f4f8ff 100%);
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 40px 18px 56px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .subhead {
            margin: 8px 0 0;
            color: var(--muted);
            max-width: 760px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button,
        a.button {
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--ink);
            padding: 10px 16px;
            border-radius: 12px;
            text-decoration: none;
            cursor: pointer;
            font: inherit;
            transition: all 0.2s;
        }

        button:hover,
        a.button:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 14px;
            margin-bottom: 26px;
        }

        .card,
        .section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 16px 34px rgba(16, 35, 63, 0.09);
        }

        .card { padding: 18px; }

        .label {
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .value {
            margin-top: 8px;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .hint {
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.5;
        }

        .section {
            padding: 18px;
            margin-bottom: 14px;
        }

        .section h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
        }

        .kv {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px 14px;
        }

        .kv div {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.55);
        }

        .kv strong {
            display: block;
            margin-bottom: 6px;
            font-size: 0.86rem;
            color: var(--muted);
            font-weight: 600;
        }

        .pill {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .pill.warn {
            background: rgba(37, 99, 235, 0.12);
            color: var(--warn);
        }

        .pill.error {
            background: rgba(220, 38, 38, 0.12);
            color: var(--error);
        }

        pre {
            margin: 0;
            padding: 14px;
            background: rgba(31, 41, 55, 0.05);
            border-radius: 14px;
            overflow: auto;
            font-size: 0.84rem;
        }

        .empty { color: var(--muted); }

        @media (max-width: 640px) {
            main { padding: 28px 14px 42px; }
        }
    </style>
</head>
<body>
    <main>
        <section class="hero">
            <div>
                <h1>Harness 状态</h1>
                <p class="subhead">
                    当前 Flask 应用、网关模式、内存后端、工具接口和迁移状态的实时运行快照。
                    此页面从 <code>/api/system/status</code> 读取数据。
                </p>
            </div>
            <div class="actions">
                <button id="refreshButton" type="button">刷新</button>
                <a class="button" href="/api/system/status">原始 JSON</a>
                <a class="button" href="/api/openapi.json">OpenAPI</a>
            </div>
        </section>

        <section id="summary" class="grid"></section>
        <section id="details"></section>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function pillClass(value) {
            if (value === "unreachable" || value === false) return "pill error";
            if (value === "hybrid" || value === "bootstrap" || value === "sidecar-ready") return "pill warn";
            return "pill";
        }

        function renderSummary(data) {
            const cards = [
                { label: "Harness", value: data.status, hint: data.timestamp },
                { label: "就绪状态", value: data.readiness.status, hint: "就绪=" + data.readiness.ready },
                { label: "网关模式", value: data.gateway.mode, hint: data.gateway.namespace },
                { label: "路由", value: data.routes.total, hint: data.routes.api + " API / " + data.routes.ui + " UI" },
                { label: "工具", value: data.tools.builtin_count, hint: data.tools.plugin_tool_count + " 插件工具" },
            ];
            return cards.map((card) => `
                <article class="card">
                    <div class="label">${escapeHtml(card.label)}</div>
                    <div class="value">${escapeHtml(card.value)}</div>
                    <div class="hint">${escapeHtml(card.hint)}</div>
                </article>
            `).join("");
        }

        function renderDetailSection(title, entries) {
            const body = entries.map((entry) => `
                <div>
                    <strong>${escapeHtml(entry.label)}</strong>
                    <span class="${entry.kind === "pill" ? pillClass(entry.value) : ""}">${escapeHtml(entry.value)}</span>
                </div>
            `).join("");
            return `<section class="section"><h2>${escapeHtml(title)}</h2><div class="kv">${body}</div></section>`;
        }

        function renderServices(services) {
            const entries = Object.entries(services).map(([name, info]) => `
                <div>
                    <strong>${escapeHtml(name)}</strong>
                    <span class="${pillClass(info.status)}">${escapeHtml(info.status)}</span>
                    <div class="hint">${escapeHtml((info.notes || []).join(" | ") || "")}</div>
                </div>
            `).join("");
            return `<section class="section"><h2>服务</h2><div class="kv">${entries}</div></section>`;
        }

        function renderJsonBlock(title, data) {
            return `<section class="section"><h2>${escapeHtml(title)}</h2><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre></section>`;
        }

        async function loadStatus() {
            const summary = document.getElementById("summary");
            const details = document.getElementById("details");
            summary.innerHTML = `<article class="card"><div class="label">状态</div><div class="value">加载中</div></article>`;
            details.innerHTML = `<section class="section empty">正在收集运行时快照...</section>`;

            try {
                const response = await fetch("/api/system/status");
                if (!response.ok) throw new Error("HTTP " + response.status);
                const data = await response.json();
                summary.innerHTML = renderSummary(data);
                details.innerHTML = [
                    renderDetailSection("运行时", [
                        { label: "Python", value: data.runtime.python_version },
                        { label: "平台", value: data.runtime.platform },
                        { label: "主机", value: data.runtime.host + ":" + data.runtime.port },
                        { label: "调试", value: String(data.runtime.debug) },
                    ]),
                    renderDetailSection("网关", [
                        { label: "模式", value: data.gateway.mode, kind: "pill" },
                        { label: "存储", value: data.gateway.storage },
                        { label: "控制平面 URL", value: data.gateway.control_plane.configured_url },
                        { label: "控制平面状态", value: data.gateway.control_plane.status, kind: "pill" },
                    ]),
                    renderDetailSection("LLM + 内存", [
                        { label: "提供商", value: data.llm.provider },
                        { label: "模型", value: data.llm.model },
                        { label: "内存激活", value: data.memory.active, kind: "pill" },
                        { label: "内存回退", value: String(Boolean(data.memory.fallback)) },
                    ]),
                    renderDetailSection("插件 + 迁移", [
                        { label: "已加载插件", value: data.plugins.loaded_count },
                        { label: "预设数量", value: data.tools.preset_count },
                        { label: "迁移状态", value: data.migration.status, kind: "pill" },
                        { label: "真实来源", value: data.migration.source_of_truth },
                    ]),
                    renderDetailSection("就绪摘要", [
                        { label: "就绪", value: String(data.readiness.ready), kind: "pill" },
                        { label: "状态", value: data.readiness.status, kind: "pill" },
                        { label: "通过检查", value: data.readiness.summary.pass },
                        { label: "警告", value: data.readiness.summary.warn + " / 失败 " + data.readiness.summary.fail },
                    ]),
                    renderServices(data.services),
                    renderJsonBlock("已加载插件名称", data.plugins.loaded_names),
                ].join("");
            } catch (error) {
                summary.innerHTML = `<article class="card"><div class="label">状态</div><div class="value">错误</div><div class="hint">${escapeHtml(error.message)}</div></article>`;
                details.innerHTML = `<section class="section empty">加载状态失败: ${escapeHtml(error.message)}</section>`;
            }
        }

        document.getElementById("refreshButton").addEventListener("click", loadStatus);
        loadStatus();
    </script>
</body>
</html>
