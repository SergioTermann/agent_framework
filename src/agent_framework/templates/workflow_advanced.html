<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级工作流编排 - Agent Framework</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base-theme.css">
    <style>
        :root {
            --theme-accent: #1363df;
            --theme-accent-deep: #0f4eb3;
            --theme-accent-soft: rgba(19, 99, 223, 0.10);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--theme-accent-deep), var(--theme-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--theme-accent), var(--theme-accent-deep));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary {
            padding: 10px 20px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 20px;
            height: fit-content;
        }

        .sidebar-title {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
        }

        .node-palette {
            display: grid;
            gap: 8px;
        }

        .node-item {
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: grab;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node-item:hover {
            background: var(--theme-accent-soft);
            border-color: var(--theme-accent);
        }

        .node-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--theme-accent-soft);
            border-radius: 6px;
            color: var(--theme-accent);
        }

        .canvas-container {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 20px;
            min-height: 600px;
            position: relative;
        }

        .canvas-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .toolbar-btn:hover {
            background: #f8fafc;
            border-color: var(--theme-accent);
        }

        .workflow-canvas {
            background:
                linear-gradient(90deg, #f1f5f9 1px, transparent 1px),
                linear-gradient(#f1f5f9 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 500px;
            border-radius: 8px;
            position: relative;
        }

        .workflow-node {
            position: absolute;
            width: 200px;
            padding: 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: move;
        }

        .workflow-node.selected {
            border-color: var(--theme-accent);
            box-shadow: 0 18px 32px -20px rgba(19, 99, 223, 0.24);
        }

        .node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .node-type-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--theme-accent-soft);
            border-radius: 6px;
            color: var(--theme-accent);
            font-size: 14px;
        }

        .node-title {
            flex: 1;
            font-weight: 600;
            font-size: 14px;
            color: #0f172a;
        }

        .node-content {
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
        }

        .node-ports {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

        .node-port {
            width: 12px;
            height: 12px;
            background: var(--theme-accent);
            border: 2px solid white;
            border-radius: 50%;
            cursor: crosshair;
        }

        .properties-panel {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 20px;
            height: fit-content;
        }

        .property-group {
            margin-bottom: 20px;
        }

        .property-label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .property-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        .property-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
        }

        .property-textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        .workflow-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--theme-accent);
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        .advanced-features {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .feature-item {
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--theme-accent-soft);
            border-radius: 6px;
            color: var(--theme-accent);
        }

        .feature-info {
            flex: 1;
        }

        .feature-name {
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
        }

        .feature-desc {
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🔀 高级工作流编排</h1>
                <p>可视化设计复杂工作流，支持条件分支、循环、并行执行等高级特性</p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="loadWorkflow()">
                    <i class="fas fa-folder-open"></i> 打开
                </button>
                <button class="btn-secondary" onclick="saveWorkflow()">
                    <i class="fas fa-save"></i> 保存
                </button>
                <button class="btn-primary" onclick="executeWorkflow()">
                    <i class="fas fa-play"></i> 执行
                </button>
            </div>
        </div>

        <div class="workflow-stats">
            <div class="stat-card">
                <div class="stat-value" id="nodeCount">0</div>
                <div class="stat-label">节点数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="connectionCount">0</div>
                <div class="stat-label">连接数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="executionTime">0ms</div>
                <div class="stat-label">执行时间</div>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <h3 class="sidebar-title">节点库</h3>
                <div class="node-palette">
                    <div class="node-item" draggable="true" data-type="trigger">
                        <div class="node-icon"><i class="fas fa-bolt"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">触发器</div>
                            <div style="font-size: 11px; color: #64748b;">工作流入口</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="condition">
                        <div class="node-icon"><i class="fas fa-code-branch"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">条件分支</div>
                            <div style="font-size: 11px; color: #64748b;">if-else 逻辑</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="loop">
                        <div class="node-icon"><i class="fas fa-sync"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">循环</div>
                            <div style="font-size: 11px; color: #64748b;">重复执行</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="parallel">
                        <div class="node-icon"><i class="fas fa-layer-group"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">并行执行</div>
                            <div style="font-size: 11px; color: #64748b;">同时运行</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="llm">
                        <div class="node-icon"><i class="fas fa-brain"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">LLM 调用</div>
                            <div style="font-size: 11px; color: #64748b;">AI 推理</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="api">
                        <div class="node-icon"><i class="fas fa-plug"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">API 请求</div>
                            <div style="font-size: 11px; color: #64748b;">HTTP 调用</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="transform">
                        <div class="node-icon"><i class="fas fa-exchange-alt"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">数据转换</div>
                            <div style="font-size: 11px; color: #64748b;">处理数据</div>
                        </div>
                    </div>

                    <div class="node-item" draggable="true" data-type="output">
                        <div class="node-icon"><i class="fas fa-check-circle"></i></div>
                        <div>
                            <div style="font-weight: 600; font-size: 13px;">输出</div>
                            <div style="font-size: 11px; color: #64748b;">工作流出口</div>
                        </div>
                    </div>
                </div>

                <div class="advanced-features">
                    <h3 class="sidebar-title" style="margin-top: 20px;">高级特性</h3>

                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-clock"></i></div>
                        <div class="feature-info">
                            <div class="feature-name">定时触发</div>
                            <div class="feature-desc">Cron 表达式调度</div>
                        </div>
                    </div>

                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="feature-info">
                            <div class="feature-name">错误处理</div>
                            <div class="feature-desc">异常捕获与重试</div>
                        </div>
                    </div>

                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-database"></i></div>
                        <div class="feature-info">
                            <div class="feature-name">状态管理</div>
                            <div class="feature-desc">工作流变量存储</div>
                        </div>
                    </div>

                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="feature-info">
                            <div class="feature-name">性能监控</div>
                            <div class="feature-desc">执行追踪与分析</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="canvas-container">
                <div class="canvas-toolbar">
                    <div class="toolbar-left">
                        <button class="toolbar-btn" title="撤销"><i class="fas fa-undo"></i></button>
                        <button class="toolbar-btn" title="重做"><i class="fas fa-redo"></i></button>
                        <button class="toolbar-btn" title="缩小"><i class="fas fa-search-minus"></i></button>
                        <button class="toolbar-btn" title="放大"><i class="fas fa-search-plus"></i></button>
                        <button class="toolbar-btn" title="适应画布"><i class="fas fa-expand"></i></button>
                    </div>
                    <div>
                        <button class="toolbar-btn" title="清空画布" onclick="clearCanvas()"><i class="fas fa-trash"></i></button>
                    </div>
                </div>

                <div class="workflow-canvas" id="workflowCanvas">
                    <!-- 工作流节点将在这里动态添加 -->
                    <div class="workflow-node" style="left: 100px; top: 50px;">
                        <div class="node-header">
                            <div class="node-type-icon"><i class="fas fa-bolt"></i></div>
                            <div class="node-title">开始</div>
                        </div>
                        <div class="node-content">工作流触发点</div>
                        <div class="node-ports">
                            <div class="node-port"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="properties-panel">
                <h3 class="sidebar-title">节点属性</h3>
                <p style="color: #64748b; font-size: 13px; margin-bottom: 20px;">选择节点以编辑属性</p>

                <div class="property-group">
                    <label class="property-label">节点名称</label>
                    <input type="text" class="property-input" placeholder="输入节点名称" value="开始">
                </div>

                <div class="property-group">
                    <label class="property-label">节点类型</label>
                    <select class="property-select">
                        <option>触发器</option>
                        <option>条件分支</option>
                        <option>循环</option>
                        <option>并行执行</option>
                        <option>LLM 调用</option>
                        <option>API 请求</option>
                        <option>数据转换</option>
                        <option>输出</option>
                    </select>
                </div>

                <div class="property-group">
                    <label class="property-label">配置</label>
                    <textarea class="property-textarea" placeholder="JSON 配置">{
  "timeout": 30000,
  "retry": 3
}</textarea>
                </div>

                <div class="property-group">
                    <label class="property-label">描述</label>
                    <textarea class="property-textarea" placeholder="节点描述" style="min-height: 60px;">工作流的起始节点</textarea>
                </div>

                <button class="btn-primary" style="width: 100%; margin-top: 12px;">
                    <i class="fas fa-save"></i> 保存属性
                </button>

                <button class="btn-secondary" style="width: 100%; margin-top: 8px; border: 1px solid #fee2e2; color: #dc2626;">
                    <i class="fas fa-trash"></i> 删除节点
                </button>
            </div>
        </div>
    </div>

    <script>
        // 工作流编排逻辑
        let nodeCount = 1;
        let connectionCount = 0;
        let selectedNode = null;

        // 更新统计
        function updateStats() {
            document.getElementById('nodeCount').textContent = nodeCount;
            document.getElementById('connectionCount').textContent = connectionCount;
        }

        // 拖拽节点到画布
        document.querySelectorAll('.node-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('nodeType', item.dataset.type);
            });
        });

        const canvas = document.getElementById('workflowCanvas');
        canvas.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('drop', (e) => {
            e.preventDefault();
            const nodeType = e.dataTransfer.getData('nodeType');
            createNode(nodeType, e.offsetX, e.offsetY);
        });

        function createNode(type, x, y) {
            const node = document.createElement('div');
            node.className = 'workflow-node';
            node.style.left = x + 'px';
            node.style.top = y + 'px';

            const icons = {
                trigger: 'bolt',
                condition: 'code-branch',
                loop: 'sync',
                parallel: 'layer-group',
                llm: 'brain',
                api: 'plug',
                transform: 'exchange-alt',
                output: 'check-circle'
            };

            const names = {
                trigger: '触发器',
                condition: '条件分支',
                loop: '循环',
                parallel: '并行执行',
                llm: 'LLM 调用',
                api: 'API 请求',
                transform: '数据转换',
                output: '输出'
            };

            node.innerHTML = `
                <div class="node-header">
                    <div class="node-type-icon"><i class="fas fa-${icons[type]}"></i></div>
                    <div class="node-title">${names[type]}</div>
                </div>
                <div class="node-content">双击编辑配置</div>
                <div class="node-ports">
                    <div class="node-port"></div>
                </div>
            `;

            canvas.appendChild(node);
            nodeCount++;
            updateStats();

            // 节点拖动
            makeDraggable(node);
        }

        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            element.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;

                // 选中节点
                document.querySelectorAll('.workflow-node').forEach(n => n.classList.remove('selected'));
                element.classList.add('selected');
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        function clearCanvas() {
            if (confirm('确定要清空画布吗？')) {
                canvas.innerHTML = '';
                nodeCount = 0;
                connectionCount = 0;
                updateStats();
            }
        }

        function saveWorkflow() {
            alert('工作流已保存');
        }

        function loadWorkflow() {
            alert('打开工作流');
        }

        function executeWorkflow() {
            alert('开始执行工作流...');
            document.getElementById('executionTime').textContent = '1250ms';
        }

        // 初始化
        updateStats();
    </script>
</body>
</html>
