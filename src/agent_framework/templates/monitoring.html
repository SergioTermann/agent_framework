<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控面板 - Agent Framework</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base-theme.css">
    <style>
        :root {
            --theme-accent: #1363df;
            --theme-accent-deep: #0f4eb3;
            --theme-accent-soft: rgba(19, 99, 223, 0.10);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--theme-accent-deep), var(--theme-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            padding: 10px 20px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .metric-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 600;
        }

        .metric-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--theme-accent-soft);
            border-radius: 8px;
            color: var(--theme-accent);
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .metric-change {
            font-size: 13px;
            font-weight: 600;
        }

        .metric-change.positive {
            color: #10b981;
        }

        .metric-change.negative {
            color: #ef4444;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 24px;
            margin-bottom: 20px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .chart-filters {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .filter-btn.active {
            background: var(--theme-accent);
            color: white;
            border-color: var(--theme-accent);
        }

        .chart-placeholder {
            height: 300px;
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 14px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .service-card {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 20px;
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .service-name {
            font-weight: 700;
            color: #0f172a;
        }

        .service-status {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-healthy {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .status-error {
            background: #fee2e2;
            color: #dc2626;
        }

        .service-metrics {
            display: grid;
            gap: 12px;
        }

        .service-metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .service-metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-size: 13px;
            color: #64748b;
        }

        .metric-val {
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
        }

        .alerts-container {
            background: white;
            border-radius: 12px;
            border: 1px solid rgba(15, 23, 42, 0.15);
            padding: 24px;
        }

        .alerts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .alerts-title {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        .alert-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid;
        }

        .alert-item.critical {
            border-left-color: #dc2626;
            background: #fef2f2;
        }

        .alert-item.warning {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .alert-item.info {
            border-left-color: #3b82f6;
            background: #eff6ff;
        }

        .alert-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .alert-item.critical .alert-icon {
            background: #fee2e2;
            color: #dc2626;
        }

        .alert-item.warning .alert-icon {
            background: #fef3c7;
            color: #f59e0b;
        }

        .alert-item.info .alert-icon {
            background: #dbeafe;
            color: #3b82f6;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .alert-description {
            font-size: 14px;
            color: #64748b;
            line-height: 1.5;
        }

        .alert-time {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 监控面板</h1>
                <p>实时监控系统性能、服务状态和资源使用情况</p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
                <button class="btn-secondary" onclick="exportReport()">
                    <i class="fas fa-download"></i> 导出报告
                </button>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-header">
                    <span class="metric-title">CPU 使用率</span>
                    <div class="metric-icon">
                        <i class="fas fa-microchip"></i>
                    </div>
                </div>
                <div class="metric-value" id="cpuUsage">0%</div>
                <div class="metric-change positive">
                    <i class="fas fa-arrow-down"></i> 较上小时 -5%
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-header">
                    <span class="metric-title">内存使用</span>
                    <div class="metric-icon">
                        <i class="fas fa-memory"></i>
                    </div>
                </div>
                <div class="metric-value" id="memoryUsage">0 GB</div>
                <div class="metric-change negative">
                    <i class="fas fa-arrow-up"></i> 较上小时 +12%
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-header">
                    <span class="metric-title">请求数/秒</span>
                    <div class="metric-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                </div>
                <div class="metric-value" id="requestRate">0</div>
                <div class="metric-change positive">
                    <i class="fas fa-arrow-up"></i> 较上小时 +23%
                </div>
            </div>

            <div class="metric-card">
                <div class="metric-header">
                    <span class="metric-title">平均响应时间</span>
                    <div class="metric-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                </div>
                <div class="metric-value" id="avgResponse">0ms</div>
                <div class="metric-change positive">
                    <i class="fas fa-arrow-down"></i> 较上小时 -8%
                </div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <h2 class="chart-title">系统性能趋势</h2>
                <div class="chart-filters">
                    <button class="filter-btn active" onclick="setTimeRange('1h')">1小时</button>
                    <button class="filter-btn" onclick="setTimeRange('6h')">6小时</button>
                    <button class="filter-btn" onclick="setTimeRange('24h')">24小时</button>
                    <button class="filter-btn" onclick="setTimeRange('7d')">7天</button>
                </div>
            </div>
            <div class="chart-placeholder" id="performanceChart">
                性能图表加载中...
            </div>
        </div>

        <h2 style="margin-bottom: 20px; color: #0f172a;">服务状态</h2>
        <div class="services-grid" id="servicesGrid">
            <!-- 服务卡片将通过 JavaScript 动态加载 -->
        </div>

        <div class="alerts-container">
            <div class="alerts-header">
                <h2 class="alerts-title">系统告警</h2>
                <button class="btn-secondary" onclick="clearAlerts()">
                    <i class="fas fa-check"></i> 全部已读
                </button>
            </div>
            <div id="alertsList">
                <!-- 告警列表将通过 JavaScript 动态加载 -->
            </div>
        </div>
    </div>

    <script>
        // 加载监控数据
        async function loadMonitoringData() {
            try {
                const response = await fetch('/api/monitoring/metrics');
                const data = await response.json();
                updateMetrics(data);
            } catch (error) {
                console.error('加载监控数据失败:', error);
                renderPlaceholder();
            }
        }

        function updateMetrics(data) {
            document.getElementById('cpuUsage').textContent = (data.cpu_usage || 0).toFixed(1) + '%';
            document.getElementById('memoryUsage').textContent = (data.memory_usage || 0).toFixed(2) + ' GB';
            document.getElementById('requestRate').textContent = data.request_rate || 0;
            document.getElementById('avgResponse').textContent = (data.avg_response_time || 0).toFixed(0) + 'ms';
        }

        function renderPlaceholder() {
            // 显示示例数据
            const services = [
                { name: 'AI Service', status: 'healthy', cpu: '45%', memory: '2.3 GB', uptime: '99.9%' },
                { name: 'Model Service', status: 'healthy', cpu: '62%', memory: '4.1 GB', uptime: '99.8%' },
                { name: 'Retrieval Service', status: 'warning', cpu: '78%', memory: '3.5 GB', uptime: '98.5%' },
                { name: 'Gateway', status: 'healthy', cpu: '23%', memory: '1.2 GB', uptime: '100%' },
                { name: 'Database', status: 'healthy', cpu: '34%', memory: '5.8 GB', uptime: '99.9%' },
                { name: 'Redis Cache', status: 'healthy', cpu: '12%', memory: '0.8 GB', uptime: '100%' }
            ];

            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = services.map(service => `
                <div class="service-card">
                    <div class="service-header">
                        <div class="service-name">${service.name}</div>
                        <div class="service-status status-${service.status}">
                            ${service.status === 'healthy' ? '正常' : service.status === 'warning' ? '警告' : '错误'}
                        </div>
                    </div>
                    <div class="service-metrics">
                        <div class="service-metric">
                            <span class="metric-label">CPU 使用率</span>
                            <span class="metric-val">${service.cpu}</span>
                        </div>
                        <div class="service-metric">
                            <span class="metric-label">内存使用</span>
                            <span class="metric-val">${service.memory}</span>
                        </div>
                        <div class="service-metric">
                            <span class="metric-label">运行时间</span>
                            <span class="metric-val">${service.uptime}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            // 渲染告警
            const alerts = [
                { type: 'warning', title: 'Retrieval Service CPU 使用率过高', description: 'CPU 使用率达到 78%，建议检查查询负载', time: '5分钟前' },
                { type: 'info', title: '系统更新完成', description: 'AI Service 已成功更新到 v2.1.0', time: '1小时前' },
                { type: 'critical', title: '磁盘空间不足', description: '数据库服务器磁盘使用率达到 85%', time: '2小时前' }
            ];

            const alertsList = document.getElementById('alertsList');
            alertsList.innerHTML = alerts.map(alert => `
                <div class="alert-item ${alert.type}">
                    <div class="alert-icon">
                        <i class="fas fa-${alert.type === 'critical' ? 'exclamation-circle' : alert.type === 'warning' ? 'exclamation-triangle' : 'info-circle'}"></i>
                    </div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.title}</div>
                        <div class="alert-description">${alert.description}</div>
                        <div class="alert-time">${alert.time}</div>
                    </div>
                </div>
            `).join('');

            // 更新示例指标
            document.getElementById('cpuUsage').textContent = '52.3%';
            document.getElementById('memoryUsage').textContent = '18.7 GB';
            document.getElementById('requestRate').textContent = '1,247';
            document.getElementById('avgResponse').textContent = '156ms';
        }

        function refreshData() {
            loadMonitoringData();
        }

        function exportReport() {
            alert('导出监控报告功能开发中...');
        }

        function setTimeRange(range) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            console.log('切换时间范围:', range);
        }

        function clearAlerts() {
            if (confirm('确定标记所有告警为已读？')) {
                document.getElementById('alertsList').innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 40px;">暂无未读告警</p>';
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadMonitoringData();
        });

        // 每30秒自动刷新
        setInterval(loadMonitoringData, 30000);
    </script>
</body>
</html>
