<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异步任务管理</title>
    <link rel="stylesheet" href="/static/css/base-theme.css">
    <style>
        :root {
            --primary: #1363df;
            --primary-deep: #0f4eb3;
            --primary-light: #dbeafe;
            --primary-soft: rgba(19, 99, 223, 0.08);
            --primary-glow: rgba(19, 99, 223, 0.28);
            --line-strong: rgba(19, 99, 223, 0.24);
            --line-glow: rgba(19, 99, 223, 0.42);
            --warning: #06b6d4;
        }
        /* page-specific overrides only — base-theme.css handles resets, body, topbar, btn */

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
        }

        .panel {
            background: white;
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .panel h2 {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background: var(--primary-deep);
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .task-item.running {
            border-left-color: #06b6d4;
            background: rgba(6, 182, 212, 0.12);
        }

        .task-item.completed {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .task-item.failed {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .task-name {
            font-weight: 600;
            color: #333;
        }

        .task-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .task-status.pending {
            background: #e0e0e0;
            color: #666;
        }

        .task-status.running {
            background: #06b6d4;
            color: white;
        }

        .task-status.completed {
            background: #28a745;
            color: white;
        }

        .task-status.failed {
            background: #dc3545;
            color: white;
        }

        .task-meta {
            font-size: 12px;
            color: #666;
        }

        .task-actions {
            margin-top: 10px;
        }

        .task-actions button {
            padding: 6px 12px;
            font-size: 12px;
            margin-right: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="page-wide">
        <nav class="topbar">
            <div class="brand">
                <a class="back-link" href="/developer">← 返回</a>
                <h1>异步任务管理</h1>
            </div>
            <div class="topbar-actions">
            </div>
        </nav>

        <div id="message" style="display: none;"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>总任务数</h3>
                <div class="value" id="total-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>等待中</h3>
                <div class="value" id="pending-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>执行中</h3>
                <div class="value" id="running-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>已完成</h3>
                <div class="value" id="completed-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>失败</h3>
                <div class="value" id="failed-tasks">0</div>
            </div>
            <div class="stat-card">
                <h3>平均耗时</h3>
                <div class="value" id="avg-duration">0s</div>
            </div>
        </div>

        <div class="panel">
            <h2>提交新任务</h2>
            <form id="submit-form">
                <div class="form-group">
                    <label>任务类型</label>
                    <select id="task-type" required>
                        <option value="data_processing">数据处理</option>
                        <option value="report_generation">报告生成</option>
                        <option value="model_training">模型训练</option>
                        <option value="batch_operation">批量操作</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>优先级</label>
                    <select id="priority">
                        <option value="low">低</option>
                        <option value="normal" selected>普通</option>
                        <option value="high">高</option>
                        <option value="urgent">紧急</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>参数 (JSON)</label>
                    <input type="text" id="params" placeholder='{"data_size": 1000}' value='{"data_size": 100}'>
                </div>
                <button type="submit" class="btn">提交任务</button>
            </form>
        </div>

        <div class="panel">
            <h2>任务列表</h2>
            <div style="margin-bottom: 20px;">
                <select id="status-filter" onchange="loadTasks()">
                    <option value="">全部状态</option>
                    <option value="pending">等待中</option>
                    <option value="running">执行中</option>
                    <option value="completed">已完成</option>
                    <option value="failed">失败</option>
                </select>
                <button class="btn" onclick="loadTasks()" style="margin-left: 10px;">刷新</button>
                <button class="btn btn-danger" onclick="clearCompleted()" style="margin-left: 10px;">清理已完成</button>
            </div>
            <ul class="task-list" id="task-list">
                <li class="loading">加载中...</li>
            </ul>
        </div>
    </div>

    <script>
        let autoRefresh = true;

        // 提交任务
        document.getElementById('submit-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const taskType = document.getElementById('task-type').value;
            const priority = document.getElementById('priority').value;
            const paramsStr = document.getElementById('params').value;

            let params = {};
            try {
                params = JSON.parse(paramsStr);
            } catch (e) {
                showMessage('参数格式错误，请输入有效的 JSON', 'error');
                return;
            }

            try {
                const response = await fetch('/api/tasks/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        task_type: taskType,
                        priority: priority,
                        params: params
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`任务已提交: ${data.task_id}`, 'success');
                    loadTasks();
                    loadStatistics();
                } else {
                    showMessage(`提交失败: ${data.error}`, 'error');
                }
            } catch (error) {
                showMessage(`提交失败: ${error.message}`, 'error');
            }
        });

        // 加载统计信息
        async function loadStatistics() {
            try {
                const response = await fetch('/api/tasks/statistics');
                const stats = await response.json();

                document.getElementById('total-tasks').textContent = stats.total;
                document.getElementById('pending-tasks').textContent = stats.pending;
                document.getElementById('running-tasks').textContent = stats.running;
                document.getElementById('completed-tasks').textContent = stats.completed;
                document.getElementById('failed-tasks').textContent = stats.failed;
                document.getElementById('avg-duration').textContent = stats.avg_duration.toFixed(2) + 's';
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 加载任务列表
        async function loadTasks() {
            const statusFilter = document.getElementById('status-filter').value;
            const url = statusFilter ? `/api/tasks/list?status=${statusFilter}` : '/api/tasks/list';

            try {
                const response = await fetch(url);
                const data = await response.json();

                const taskList = document.getElementById('task-list');
                taskList.innerHTML = '';

                if (data.tasks.length === 0) {
                    taskList.innerHTML = '<li class="loading">暂无任务</li>';
                    return;
                }

                data.tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.status}`;
                    li.innerHTML = `
                        <div class="task-header">
                            <span class="task-name">${task.name}</span>
                            <span class="task-status ${task.status}">${task.status}</span>
                        </div>
                        <div class="task-meta">
                            ID: ${task.task_id}<br>
                            创建时间: ${task.created_at}<br>
                            ${task.duration ? `耗时: ${task.duration.toFixed(2)}秒` : ''}
                            ${task.error ? `<br>错误: ${task.error}` : ''}
                        </div>
                        <div class="task-actions">
                            <button class="btn" onclick="viewTaskResult('${task.task_id}')">查看结果</button>
                            ${task.status === 'pending' ? `<button class="btn btn-danger" onclick="cancelTask('${task.task_id}')">取消</button>` : ''}
                        </div>
                    `;
                    taskList.appendChild(li);
                });
            } catch (error) {
                console.error('加载任务失败:', error);
            }
        }

        // 查看任务结果
        async function viewTaskResult(taskId) {
            try {
                const response = await fetch(`/api/tasks/${taskId}/result`);
                const data = await response.json();

                if (response.ok) {
                    alert(`任务结果:\n${JSON.stringify(data.result, null, 2)}`);
                } else {
                    alert(`无法获取结果: ${data.error}`);
                }
            } catch (error) {
                alert(`获取结果失败: ${error.message}`);
            }
        }

        // 取消任务
        async function cancelTask(taskId) {
            if (!confirm('确定要取消这个任务吗？')) return;

            try {
                const response = await fetch(`/api/tasks/${taskId}/cancel`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('任务已取消', 'success');
                    loadTasks();
                    loadStatistics();
                } else {
                    showMessage(`取消失败: ${data.error}`, 'error');
                }
            } catch (error) {
                showMessage(`取消失败: ${error.message}`, 'error');
            }
        }

        // 清理已完成任务
        async function clearCompleted() {
            if (!confirm('确定要清理所有已完成的任务吗？')) return;

            try {
                const response = await fetch('/api/tasks/clear', {
                    method: 'POST'
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadTasks();
                    loadStatistics();
                } else {
                    showMessage('清理失败', 'error');
                }
            } catch (error) {
                showMessage(`清理失败: ${error.message}`, 'error');
            }
        }

        // 显示消息
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // 初始加载
        loadStatistics();
        loadTasks();

        // 自动刷新
        setInterval(() => {
            if (autoRefresh) {
                loadStatistics();
                loadTasks();
            }
        }, 3000);
    </script>
</body>
</html>
