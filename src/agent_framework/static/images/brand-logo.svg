<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00acc1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#26a69a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00838f;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>

    <!-- 光晕效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 阴影效果 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00acc1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆环 -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#primaryGradient)" stroke-width="1" opacity="0.2"/>

  <!-- 风力涡轮机叶片 - 中心旋转设计 -->
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <!-- 叶片1 -->
    <path d="M 0,-120 Q -30,-80 -40,-40 L -10,-10 Q -5,-60 0,-120 Z"
          fill="url(#primaryGradient)" opacity="0.9">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0"
        to="360"
        dur="8s"
        repeatCount="indefinite"/>
    </path>

    <!-- 叶片2 -->
    <path d="M 0,-120 Q 30,-80 40,-40 L 10,-10 Q 5,-60 0,-120 Z"
          fill="url(#primaryGradient)" opacity="0.9"
          transform="rotate(120)">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="120"
        to="480"
        dur="8s"
        repeatCount="indefinite"/>
    </path>

    <!-- 叶片3 -->
    <path d="M 0,-120 Q 30,-80 40,-40 L 10,-10 Q 5,-60 0,-120 Z"
          fill="url(#primaryGradient)" opacity="0.9"
          transform="rotate(240)">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="240"
        to="600"
        dur="8s"
        repeatCount="indefinite"/>
    </path>

    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="15" fill="url(#accentGradient)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- 能量流动线条 -->
  <g opacity="0.6">
    <path d="M 100,200 Q 150,180 200,200" stroke="url(#accentGradient)" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 200,200 Q 250,220 300,200" stroke="url(#accentGradient)" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 文字 - 风起时域 -->
  <text x="200" y="320" font-family="'Noto Sans SC', sans-serif" font-size="32" font-weight="700"
        text-anchor="middle" fill="url(#primaryGradient)" filter="url(#glow)">
    风起时域
  </text>

  <!-- 英文副标题 -->
  <text x="200" y="350" font-family="'Rajdhani', sans-serif" font-size="14" font-weight="500"
        text-anchor="middle" fill="#00acc1" opacity="0.8" letter-spacing="2">
    WIND RISE ERA
  </text>

  <!-- 装饰性能量点 -->
  <circle cx="80" cy="200" r="3" fill="#ff9800" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="200" r="3" fill="#ff9800" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.75s" repeatCount="indefinite"/>
  </circle>
</svg>
