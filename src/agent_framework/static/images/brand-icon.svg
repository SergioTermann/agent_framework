<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00acc1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26a69a;stop-opacity:1" />
    </linearGradient>

    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 风力涡轮机简化图标 -->
  <g transform="translate(100, 100)" filter="url(#iconGlow)">
    <!-- 三个叶片 -->
    <path d="M 0,-60 Q -15,-40 -20,-20 L -5,-5 Q -2.5,-30 0,-60 Z"
          fill="url(#iconGradient)" opacity="0.95">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="360"
        dur="6s"
        repeatCount="indefinite"/>
    </path>

    <path d="M 0,-60 Q 15,-40 20,-20 L 5,-5 Q 2.5,-30 0,-60 Z"
          fill="url(#iconGradient)" opacity="0.95"
          transform="rotate(120)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="120"
        to="480"
        dur="6s"
        repeatCount="indefinite"/>
    </path>

    <path d="M 0,-60 Q 15,-40 20,-20 L 5,-5 Q 2.5,-30 0,-60 Z"
          fill="url(#iconGradient)" opacity="0.95"
          transform="rotate(240)">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="240"
        to="600"
        dur="6s"
        repeatCount="indefinite"/>
    </path>

    <!-- 中心 -->
    <circle cx="0" cy="0" r="8" fill="#ff9800"/>
    <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- 外圈装饰 -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.3"/>
</svg>
